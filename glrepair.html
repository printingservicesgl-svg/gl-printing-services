<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GL TECH | Ultra V15 JO System</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <!-- PDF & QR Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #050505;
            --accent: #d4af37;
            --accent-glow: rgba(212, 175, 55, 0.4);
            --card-bg: rgba(15, 15, 15, 0.98);
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --error: #ff4d4d;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.2s ease-in-out; }
        
        body { 
            background: var(--bg); 
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(212, 175, 55, 0.05) 0%, transparent 20%),
                linear-gradient(180deg, #121212 0%, #050505 100%);
            color: var(--text-main); 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center; min-height: 100vh; 
        }

        .ultra-container {
            max-width: 650px; width: 100%; 
            background: var(--card-bg); 
            backdrop-filter: blur(25px);
            border: 1px solid var(--border); 
            border-radius: 40px; 
            padding: 40px; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.9);
            position: relative; overflow: hidden;
        }

        .ultra-container::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .header-brand { text-align: center; margin-bottom: 35px; }
        .header-brand h1 { 
            font-weight: 800; font-size: 2.5rem; margin: 0; 
            background: linear-gradient(135deg, #fff 30%, var(--accent) 100%); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            letter-spacing: -1px;
        }

        .service-selector { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        .svc-card {
            background: var(--glass); border: 1px solid var(--border); padding: 18px 5px;
            border-radius: 20px; text-align: center; cursor: pointer; font-size: 0.85rem; font-weight: 700;
        }
        .svc-card:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); transform: translateY(-3px); }
        .svc-card.active { border-color: var(--accent); background: rgba(212, 175, 55, 0.12); box-shadow: 0 10px 25px rgba(212, 175, 55, 0.2); color: var(--accent); }

        .input-group { margin-bottom: 25px; }
        label { display: block; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 10px; text-transform: uppercase; font-weight: 800; letter-spacing: 1.5px; }
        label span { color: var(--accent); }

        input, select {
            width: 100%; background: #000; border: 1px solid var(--border); padding: 16px;
            border-radius: 16px; color: white; outline: none; font-size: 1rem;
        }
        input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1); }
        
        input.error { border-color: var(--error); box-shadow: 0 0 0 4px rgba(255, 77, 77, 0.1); }

        .chip-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .chip { padding: 12px 20px; background: var(--glass); border: 1px solid var(--border); border-radius: 50px; font-size: 0.8rem; cursor: pointer; font-weight: 600; }
        .chip:hover { border-color: var(--accent); }
        .chip.selected { background: var(--accent); color: #000; font-weight: 800; border-color: var(--accent); transform: scale(1.05); }

        #price-panel { 
            margin-top: 30px; text-align: center; display: none; padding-top: 30px; 
            border-top: 1px dashed var(--border); animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .total-amount { font-size: 3.2rem; font-weight: 800; color: var(--accent); margin: 10px 0; letter-spacing: -2px; }

        .btn-book {
            width: 100%; padding: 22px; background: var(--accent); color: black; border: none;
            border-radius: 20px; font-weight: 800; text-transform: uppercase; cursor: pointer;
            box-shadow: 0 15px 35px var(--accent-glow); font-size: 1.1rem;
        }
        .btn-book:hover { transform: translateY(-4px); box-shadow: 0 20px 50px var(--accent-glow); background: #e5be4a; }
        
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        #qrcode { display: none; }
    </style>
</head>
<body>

<div id="qrcode"></div>

<div class="ultra-container">
    <div class="header-brand">
        <h1>GL TECH ULTRA</h1>
        <p style="color: var(--text-dim); font-size: 0.75rem; margin-top: 8px; letter-spacing: 3px; font-weight: 700;">ELITE DIGITAL JO SYSTEM • V15</p>
    </div>

    <div class="service-selector">
        <div class="svc-card active" id="btn-mobile" onclick="setService('mobile')">📱 MOBILE</div>
        <div class="svc-card" id="btn-pc" onclick="setService('pc')">💻 PC/LAPTOP</div>
        <div class="svc-card" id="btn-software" onclick="setService('software')">🛠️ SOFTWARE</div>
    </div>

    <div class="input-group">
        <label>Customer Information <span>*</span></label>
        <input type="text" id="cust-name" placeholder="Full Name" required style="margin-bottom: 12px;">
        <input type="text" id="cust-phone" placeholder="Messenger Account Link or Name (Required)" required>
    </div>

    <div class="input-group">
        <label id="dynamic-label">Unit / Project Category <span>*</span></label>
        <select id="device-brand" required></select>
        <input type="text" id="device-sn" placeholder="SN / IMEI / Reference Name" style="margin-top: 12px;">
    </div>

    <div class="input-group">
        <label>Selected Services <span>(Select at least one)</span></label>
        <div class="chip-grid" id="chip-container"></div>
    </div>

    <div id="price-panel">
        <div style="font-size: 0.8rem; color: var(--text-dim); letter-spacing: 2px; font-weight: 700;">PROFESSIONAL QUOTE</div>
        <div class="total-amount" id="final-price">₱0</div>
        <p id="eta" style="color: var(--text-dim); font-size: 0.9rem; margin-bottom: 25px; font-weight: 500;"></p>
        <button class="btn-book" id="booking-btn" onclick="processBooking()">Generate JO & Confirm Booking</button>
    </div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    let currentService = 'mobile';

    const serviceData = {
        mobile: {
            label: "Device Brand",
            brands: ["Apple iPhone", "Samsung Galaxy", "Infinix / Tecno", "Realme / Oppo / Vivo", "Xiaomi / Poco"],
            issues: [{n: "LCD Replacement", p: 1800}, {n: "Battery Swap", p: 850}, {n: "Charging Port Fix", p: 600}, {n: "Unlock / Bypass", p: 1500}]
        },
        pc: {
            label: "PC/Laptop Brand",
            brands: ["Asus / ROG", "Acer / Predator", "HP / Dell / Lenovo", "MacBook", "Custom Desktop"],
            issues: [{n: "Deep Cleaning/Repaste", p: 800}, {n: "OS Reformat", p: 700}, {n: "SSD Upgrade", p: 1800}, {n: "Keyboard/LCD Swap", p: 2500}]
        },
        software: {
            label: "Service Type",
            brands: ["Web Development", "Business Tools", "App Installation", "Data Recovery", "System Optimization"],
            issues: [{n: "Standard Website Build", p: 5000}, {n: "Custom Automation", p: 2500}, {n: "Deep Data Recovery", p: 1500}, {n: "Malware Removal", p: 800}]
        }
    };

    function setService(type) {
        currentService = type;
        document.querySelectorAll('.svc-card').forEach(c => c.classList.remove('active'));
        document.getElementById(`btn-${type}`).classList.add('active');
        document.getElementById('dynamic-label').innerHTML = `${serviceData[type].label} <span>*</span>`;
        const brandSel = document.getElementById('device-brand');
        brandSel.innerHTML = `<option value="">Select ${serviceData[type].label}</option>`;
        serviceData[type].brands.forEach(b => {
            const opt = document.createElement('option');
            opt.value = b; opt.innerText = b;
            brandSel.appendChild(opt);
        });
        renderChips();
        calculate();
    }

    function renderChips() {
        const container = document.getElementById('chip-container');
        container.innerHTML = "";
        serviceData[currentService].issues.forEach(issue => {
            const chip = document.createElement('div');
            chip.className = "chip";
            chip.innerText = issue.n;
            chip.onclick = () => { chip.classList.toggle('selected'); calculate(); };
            container.appendChild(chip);
        });
    }

    function calculate() {
        const chips = document.querySelectorAll('.chip.selected');
        let total = 0;
        const panel = document.getElementById('price-panel');
        
        if(chips.length > 0) {
            chips.forEach(c => {
                const found = serviceData[currentService].issues.find(i => i.n === c.innerText);
                if(found) total += found.p;
            });
            total += (currentService === 'mobile' ? 300 : currentService === 'pc' ? 500 : 1000); 
            document.getElementById('final-price').innerText = `₱${total.toLocaleString()}`;
            document.getElementById('eta').innerText = `⏱ Estimated TAT: ${chips.length + 1} - 24 Hours`;
            
            if(panel.style.display !== "block") {
                panel.style.display = "block";
                panel.scrollIntoView({ behavior: 'smooth' });
            }
        } else { panel.style.display = "none"; }
    }

    function generatePDF(joNumber, name, phone, brand, sn, issues, price) {
        const doc = new jsPDF();
        const date = new Date().toLocaleString();
        
        doc.setFillColor(15, 15, 15);
        doc.rect(0, 0, 210, 50, 'F');
        doc.setTextColor(212, 175, 55);
        doc.setFontSize(28);
        doc.setFont(undefined, 'bold');
        doc.text("GL TECH ULTRA", 105, 28, null, null, "center");
        doc.setFontSize(10);
        doc.setFont(undefined, 'normal');
        doc.text("PREMIUM REPAIR & SOFTWARE SOLUTIONS • MUNTINLUPA", 105, 38, null, null, "center");

        const qrContainer = document.getElementById("qrcode");
        qrContainer.innerHTML = "";
        new QRCode(qrContainer, { text: `JO-${joNumber}`, width: 100, height: 100 });
        
        setTimeout(() => {
            const qrCanvas = qrContainer.querySelector('canvas');
            const qrImage = qrCanvas.toDataURL("image/png");
            doc.addImage(qrImage, 'PNG', 165, 60, 30, 30);

            doc.setTextColor(40, 40, 40);
            doc.text(`JO# ${joNumber}`, 20, 65);
            doc.text(`DATE: ${date}`, 20, 70);

            doc.setFont(undefined, 'bold');
            doc.text("CLIENT INFO", 20, 85);
            doc.setFont(undefined, 'normal');
            doc.text(`Name: ${name}`, 20, 93);
            doc.text(`Messenger/Contact: ${phone}`, 20, 98);

            doc.setFont(undefined, 'bold');
            doc.text("TECHNICAL SPECS", 20, 115);
            doc.setFont(undefined, 'normal');
            doc.text(`Category: ${currentService.toUpperCase()}`, 20, 123);
            doc.text(`Unit/Type: ${brand}`, 20, 128);
            doc.text(`ID (SN/IMEI): ${sn || "N/A"}`, 20, 133);

            doc.setFont(undefined, 'bold');
            doc.text("WORK DESCRIPTION", 20, 150);
            doc.setFont(undefined, 'normal');
            doc.text(issues, 20, 158, { maxWidth: 170 });

            doc.setFontSize(20);
            doc.setTextColor(212, 175, 55);
            doc.text(`TOTAL ESTIMATE: ${price}`, 20, 190);

            doc.setFontSize(8);
            doc.setTextColor(120, 120, 120);
            doc.text("1. NO WARRANTY for water damage/corrosion units.", 20, 220);
            doc.text("2. 7-day hardware warranty (Factory defects only).", 20, 225);
            doc.text("3. Units unclaimed after 60 days will be disposed of.", 20, 230);
            doc.text("4. Location: Residential Apartment, Muntinlupa City.", 20, 235);

            doc.save(`GL-TECH-JO-${joNumber}.pdf`);
        }, 500);
    }

    function processBooking() {
        const nameInput = document.getElementById('cust-name');
        const phoneInput = document.getElementById('cust-phone');
        const brandInput = document.getElementById('device-brand');
        const btn = document.getElementById('booking-btn');

        const name = nameInput.value.trim();
        const phone = phoneInput.value.trim();
        const brand = brandInput.value;
        const sn = document.getElementById('device-sn').value;
        const price = document.getElementById('final-price').innerText;
        const selected = Array.from(document.querySelectorAll('.chip.selected')).map(c => c.innerText).join(', ');

        // Validation Logic
        let isValid = true;
        [nameInput, phoneInput, brandInput].forEach(el => {
            if(!el.value || el.value === "") {
                el.classList.add('error');
                isValid = false;
            } else {
                el.classList.remove('error');
            }
        });

        if(!isValid) {
            btn.classList.add('shake');
            setTimeout(() => btn.classList.remove('shake'), 400);
            alert("Pakikumpleto ang lahat ng field na may asterisk (*) at ilagay ang Messenger account.");
            return;
        }

        const joNumber = Math.floor(100000 + Math.random() * 900000);
        
        generatePDF(joNumber, name, phone, brand, sn, selected, price);

        const msg = `JO#${joNumber}\nName: ${name}\nMessenger: ${phone}\nUnit: ${brand}\nIssues: ${selected}\nPrice: ${price}\nStatus: New Booking via Web.`;

        // Updated Direct Page Link
        const messengerUrl = `https://www.facebook.com/messages/t/106649774351659?text=${encodeURIComponent(msg)}`;
        window.open(messengerUrl, '_blank');
    }

    setService('mobile');
</script>
</body>
</html>
