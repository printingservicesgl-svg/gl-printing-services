<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GL TECH | Ultra Repair V12</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #d4af37;
            --accent-glow: rgba(212, 175, 55, 0.4);
            --card-bg: rgba(20, 20, 20, 0.9);
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #050505 100%);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .ultra-container {
            max-width: 650px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        .header-brand { text-align: center; margin-bottom: 40px; }
        .header-brand h1 { 
            font-weight: 800; font-size: 2.2rem; margin: 0; letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .service-selector {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 30px;
        }

        .svc-card {
            background: var(--glass); border: 1px solid var(--border); padding: 15px;
            border-radius: 16px; text-align: center; cursor: pointer; transition: 0.3s;
        }

        .svc-card.active {
            border-color: var(--accent); background: rgba(212, 175, 55, 0.15);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; font-weight: 700; }

        /* FIXED DROPDOWN STYLING */
        select {
            width: 100%;
            background: #1a1a1a; /* Solid background to prevent transparency issues */
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            outline: none;
            appearance: none;
            cursor: pointer;
        }

        select option {
            background: #1a1a1a;
            color: white;
            padding: 10px;
        }

        select:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }

        .issue-chip-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }

        .chip {
            padding: 12px 20px; background: var(--glass); border: 1px solid var(--border);
            border-radius: 50px; font-size: 0.85rem; cursor: pointer; transition: 0.3s;
        }

        .chip.selected { background: var(--text-main); color: #000; border-color: var(--text-main); font-weight: 700; }

        .ai-core {
            background: linear-gradient(145deg, #111, #000);
            border: 1px solid var(--accent); border-radius: 24px; padding: 25px; margin: 30px 0;
        }

        #ai-output { font-size: 0.9rem; line-height: 1.6; color: #eee; margin-bottom: 15px; min-height: 40px; }

        .btn-glow {
            width: 100%; padding: 20px; background: var(--accent); color: black; border: none;
            border-radius: 16px; font-weight: 800; font-size: 1.1rem; text-transform: uppercase;
            cursor: pointer; transition: 0.3s; box-shadow: 0 10px 30px var(--accent-glow);
        }

        #price-panel { margin-top: 20px; text-align: center; display: none; border-top: 1px solid var(--border); padding-top: 20px; }
        .total-amount { font-size: 3rem; font-weight: 800; color: var(--accent); margin: 5px 0; }
    </style>
</head>
<body>

<div class="ultra-container">
    <div class="header-brand">
        <h1>GL TECH ULTRA</h1>
        <p>Premium Tech Solutions | Muntinlupa</p>
    </div>

    <div class="service-selector">
        <div class="svc-card active" id="btn-mobile" onclick="setService('mobile')">📱 Mobile</div>
        <div class="svc-card" id="btn-pc" onclick="setService('pc')">💻 PC/Laptop</div>
        <div class="svc-card" id="btn-soft" onclick="setService('software')">🛠️ Software</div>
    </div>

    <div class="input-group">
        <label id="brand-label">Device Brand</label>
        <select id="device-brand" onchange="calculate()">
            <!-- Options populated by JS -->
        </select>
    </div>

    <div class="input-group">
        <label>Service / Repair Checklist</label>
        <div class="issue-chip-grid" id="chip-container">
            <!-- Chips populated by JS -->
        </div>
    </div>

    <div class="ai-core">
        <div id="ai-output">System Active. Describe the issue for an instant diagnostic.</div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="ai-input" placeholder="e.g. 'Laptop won't turn on'" style="width: 80%; background: var(--glass); border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: white;">
            <button class="svc-card" style="width: 20%; padding: 0;" onclick="runAI()">AI</button>
        </div>
    </div>

    <div id="price-panel">
        <div style="font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase;">Estimated Quote</div>
        <div class="total-amount" id="final-price">₱0</div>
        <p id="eta" style="color: var(--text-dim); font-size: 0.85rem; margin-bottom: 20px;"></p>
        <button class="btn-glow" onclick="finalize()">Finalize Booking</button>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyBa_SCwnK2FS5JEdedEHCLCpm1ALJ-219k";
    let currentService = 'mobile';

    const serviceData = {
        mobile: {
            brands: ["Apple iPhone", "Samsung Galaxy", "Infinix / Tecno", "Realme / Oppo / Vivo", "Xiaomi / Poco"],
            issues: [
                {n: "LCD Replacement", p: 1800}, {n: "Battery Replacement", p: 850},
                {n: "Charging Port", p: 600}, {n: "Back Glass Fix", p: 1200},
                {n: "Unlock / Bypass", p: 1500}
            ]
        },
        pc: {
            brands: ["Asus / ROG", "Acer / Predator", "HP / Dell / Lenovo", "MacBook Air/Pro", "Custom Desktop PC"],
            issues: [
                {n: "Cleaning & Repaste", p: 800}, {n: "Windows/OS Reformat", p: 700},
                {n: "SSD Upgrade (256GB+)", p: 1800}, {n: "No Power / No Display", p: 1500},
                {n: "Keyboard/LCD Swap", p: 2500}
            ]
        },
        software: {
            brands: ["Web Development", "Business Tools", "App Installation", "Data Recovery"],
            issues: [
                {n: "Standard Website Build", p: 5000}, {n: "Custom Tool / Script", p: 2500},
                {n: "Data Recovery", p: 1500}, {n: "System Optimization", p: 800}
            ]
        }
    };

    function setService(type) {
        currentService = type;
        document.querySelectorAll('.svc-card').forEach(c => c.classList.remove('active'));
        document.getElementById(`btn-${type === 'software' ? 'soft' : type}`).classList.add('active');
        
        // Update Brands
        const brandSel = document.getElementById('device-brand');
        brandSel.innerHTML = "";
        serviceData[type].brands.forEach(b => {
            const opt = document.createElement('option');
            opt.value = b; opt.innerText = b;
            brandSel.appendChild(opt);
        });

        renderChips();
        calculate();
    }

    function renderChips() {
        const container = document.getElementById('chip-container');
        container.innerHTML = "";
        serviceData[currentService].issues.forEach(issue => {
            const chip = document.createElement('div');
            chip.className = "chip";
            chip.innerText = issue.n;
            chip.onclick = () => {
                chip.classList.toggle('selected');
                calculate();
            };
            container.appendChild(chip);
        });
    }

    function calculate() {
        const chips = document.querySelectorAll('.chip.selected');
        const priceDisplay = document.getElementById('final-price');
        const panel = document.getElementById('price-panel');
        let total = 0;

        if(chips.length > 0) {
            chips.forEach(c => {
                const found = serviceData[currentService].issues.find(i => i.n === c.innerText);
                if(found) total += found.p;
            });
            // Base Labor Fee
            total += (currentService === 'mobile' ? 300 : 500); 
            priceDisplay.innerText = `₱${total.toLocaleString()}`;
            document.getElementById('eta').innerText = `⚡ Est. Completion: ${chips.length + 1} Hours`;
            panel.style.display = "block";
        } else { panel.style.display = "none"; }
    }

    async function runAI() {
        const input = document.getElementById('ai-input').value;
        const out = document.getElementById('ai-output');
        if(!input) return;
        out.innerText = "Analyzing system logs...";
        try {
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Expert tech diagnostic for GL TECH. Concise Taglish: "${input}". Recommend Muntinlupa physical check.` }]}]
                })
            });
            const data = await resp.json();
            out.innerText = data.candidates[0].content.parts[0].text;
        } catch(e) { out.innerText = "Check your connection and API key."; }
    }

    function finalize() {
        const brand = document.getElementById('device-brand').value;
        const price = document.getElementById('final-price').innerText;
        const msg = `GL TECH ULTRA BOOKING:%0AService: ${currentService.toUpperCase()}%0ABrand: ${brand}%0ATotal Quote: ${price}%0A(Residential Apartment Drop-off)`;
        window.open(`https://m.me/GLPrintingServices?text=${msg}`, '_blank');
    }

    // Initial Load
    setService('mobile');
</script>

</body>
</html>
