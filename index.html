<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GL PRINTS | Muntinlupa City</title>
<link rel="icon" type="image/png" href="GL_Logo.png">

<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500&display=swap" rel="stylesheet">

<style>
:root {
    --neon-gold:#ffcc00;
    --deep:#0a0a0a;
}

/* GLOBAL */
*{margin:0;padding:0;box-sizing:border-box;}
body{
    background:var(--deep);
    color:white;
    font-family:'Space Grotesk';
}

/* HEADER */
header{
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
}

/* LOGO */
.gl-logo{
    width:130px;
    filter:drop-shadow(0 0 20px var(--neon-gold));
}

/* TITLE */
h1{
    font-family:'Syncopate';
    font-size:4rem;
    letter-spacing:8px;
    background:linear-gradient(to right,#fff,var(--neon-gold),#fff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* NAV (IMPROVED HOVER) */
nav{
    position:fixed;
    bottom:25px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.7);
    padding:12px 30px;
    border-radius:50px;
    display:flex;
    gap:25px;
    backdrop-filter:blur(10px);
}

nav a{
    color:white;
    text-decoration:none;
    font-size:0.8rem;
    position:relative;
    transition:0.3s;
}

nav a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-5px;
    width:0%;
    height:2px;
    background:var(--neon-gold);
    transition:0.4s;
    box-shadow:0 0 10px var(--neon-gold);
}

nav a:hover{
    color:var(--neon-gold);
    text-shadow:0 0 10px var(--neon-gold);
}

nav a:hover::after{
    width:100%;
}

/* ENTER BUTTON (FIXED DESIGN) */
.btn-glitch{
    margin-top:20px;
    padding:15px 40px;
    background:transparent;
    border:2px solid var(--neon-gold);
    color:var(--neon-gold);
    font-family:'Syncopate';
    cursor:pointer;
    position:relative;
    overflow:hidden;
    transition:0.3s;
}

.btn-glitch::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:var(--neon-gold);
    top:0;
    left:-100%;
    transition:0.4s;
    z-index:-1;
}

.btn-glitch:hover::before{
    left:0;
}

.btn-glitch:hover{
    color:black;
    box-shadow:0 0 20px var(--neon-gold);
}

/* SERVICES */
.container{
    padding:80px 5%;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.tilt-card{
    background:rgba(255,255,255,0.03);
    padding:25px;
    border-radius:15px;
    border:1px solid rgba(255,255,255,0.1);
    transition:0.4s;
}

.tilt-card:hover{
    transform:translateY(-8px);
    border-color:var(--neon-gold);
    box-shadow:0 0 25px rgba(255,204,0,0.3);
}

/* CONTACT */
#contact{text-align:center;padding:80px;}
#phone-num{color:var(--neon-gold);cursor:pointer;margin-bottom:15px;}

/* FB BUTTON */
.fb-btn{
    padding:12px 25px;
    background:#1877f2;
    border:none;
    border-radius:25px;
    color:white;
    cursor:pointer;
    transition:0.3s;
}
.fb-btn:hover{
    transform:scale(1.1);
}

/* CHAT BUTTON */
#ai-chat-btn{
    position:fixed;
    bottom:90px;
    right:25px;
    width:60px;height:60px;
    border:2px solid var(--neon-gold);
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
}

/* CHAT BOX */
#chat-box{
    position:fixed;
    bottom:160px;
    right:25px;
    width:320px;
    height:420px;
    background:#0a0a0a;
    border:1px solid var(--neon-gold);
    display:none;
    flex-direction:column;
    border-radius:15px;
}

/* CHAT DISPLAY */
#chat-display{
    flex:1;
    padding:15px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
}

/* MESSAGES */
.bot-bubble{
    background:rgba(255,204,0,0.08);
    border:1px solid var(--neon-gold);
    padding:10px;
    border-radius:10px;
    color:var(--neon-gold);
    font-size:13px;
}

.user-msg{
    align-self:flex-end;
    background:#222;
    padding:10px;
    border-radius:10px;
}

/* INPUT AREA (IMPROVED) */
.chat-input-area{
    display:flex;
    border-top:1px solid rgba(255,255,255,0.1);
}

#chat-input{
    flex:1;
    padding:12px;
    background:black;
    border:none;
    color:white;
}

#chat-input:focus{
    outline:none;
}

.send-btn{
    padding:12px;
    background:var(--neon-gold);
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<nav>
<a href="#home">Home</a>
<a href="#services">Services</a>
<a href="#contact">Contact</a>
</nav>

<header id="home">
<img src="GL_Logo.png" class="gl-logo">
<h1>GL PRINTS</h1>
<p>EST. 2025 | MUNTINLUPA CITY</p>
<button class="btn-glitch" onclick="location.href='#services'">ENTER SYSTEM</button>
</header>

<section id="services" class="container">
<div class="tilt-card"><h3>EVENT & MEDIA PRINTS</h3></div>
<div class="tilt-card"><h3>DIGITAL DESIGN</h3></div>
<div class="tilt-card"><h3>E-GOV</h3></div>
<div class="tilt-card"><h3>TECH ASSIST</h3></div>
</section>

<section id="contact">
<h2>CONTACT</h2>
<p id="phone-num" onclick="copyNumber()">0991 636 1742</p>

<button class="fb-btn" onclick="window.open('https://facebook.com/YOURPAGE')">
Visit our Facebook
</button>
</section>

<!-- CHAT -->
<div id="ai-chat-btn" onclick="toggleChat()">
<img src="GL_Logo.png" style="width:35px;">
</div>

<div id="chat-box">
<div id="chat-display">
<div class="bot-bubble">Welcome to GL Prints 🚀</div>
</div>

<div class="chat-input-area">
<input id="chat-input" placeholder="Type your message...">
<button class="send-btn" onclick="askAI()">Send</button>
</div>
</div>

<script>
function toggleChat(){
let box=document.getElementById("chat-box");
box.style.display=box.style.display==="flex"?"none":"flex";
}

function askAI(){
let input=document.getElementById("chat-input");
let msg=input.value;
let display=document.getElementById("chat-display");

if(!msg) return;

display.innerHTML+=`<div class="user-msg">${msg}</div>`;

setTimeout(()=>{
display.innerHTML+=`<div class="bot-bubble">Please message us on Facebook for full details.</div>`;
display.scrollTop=display.scrollHeight;
},500);

input.value="";
}

// ENTER KEY SEND
document.getElementById("chat-input").addEventListener("keypress",function(e){
if(e.key==="Enter"){
askAI();
}
});

function copyNumber(){
navigator.clipboard.writeText("09916361742");
alert("Copied!");
}
</script>

</body>
</html>
