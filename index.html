<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GL PRINTS | Muntinlupa City</title>
<link rel="icon" type="image/png" href="GL_Logo.png">

<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/scrollreveal"></script>

<style>
:root {
    --neon-gold: #ffcc00;
    --deep-ads: #0a0a0a;
    --text-gray: #888;
    --glass: rgba(255,255,255,0.03);
    --glass-border: rgba(255,255,255,0.1);
}

* { margin:0; padding:0; box-sizing:border-box; scroll-behavior:smooth; }

body {
    background: var(--deep-ads);
    color:white;
    font-family:'Space Grotesk', sans-serif;
    overflow-x:hidden;
}

/* PARTICLES */
#particles {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -2;
}

/* CURSOR */
#cursor {
    width:20px;height:20px;border:2px solid var(--neon-gold);
    border-radius:50%;position:fixed;pointer-events:none;z-index:9999;
    display:none;
}
@media(min-width:1024px){
    *{cursor:none;}
    #cursor{display:block;}
}

/* GRID BG */
.grid-bg{
    position:fixed;width:100%;height:100%;
    background-image:
    linear-gradient(rgba(255,204,0,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,204,0,0.03) 1px, transparent 1px);
    background-size:40px 40px;
    z-index:-1;
}

/* HEADER */
header{
    height:100vh;display:flex;flex-direction:column;
    justify-content:center;align-items:center;text-align:center;
    background: radial-gradient(circle, rgba(255,204,0,0.08), black);
}

.gl-logo{
    width:120px;
    filter:drop-shadow(0 0 20px var(--neon-gold));
    animation:float 4s infinite;
}
@keyframes float{
    50%{transform:translateY(-15px);}
}

h1{
    font-family:'Syncopate';
    font-size:4rem;
    letter-spacing:10px;
    background:linear-gradient(to right,#fff,var(--neon-gold),#fff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* NAV */
nav{
    position:fixed;bottom:25px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,0.7);padding:10px 30px;border-radius:50px;
    display:flex;gap:25px;z-index:1000;
}
nav a{
    color:white;text-decoration:none;font-size:12px;
    position:relative;
}
nav a::after{
    content:"";position:absolute;width:0;height:2px;
    background:var(--neon-gold);bottom:-5px;left:0;
    transition:0.3s;
}
nav a:hover::after{width:100%;}

/* CONTAINER */
.container{
    padding:80px 5%;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

/* CARD */
.tilt-card{
    background:var(--glass);
    border:1px solid var(--glass-border);
    padding:30px;border-radius:20px;text-align:center;
    transition:0.4s;
}
.tilt-card:hover{
    transform:translateY(-10px);
    border-color:var(--neon-gold);
    box-shadow:0 0 40px rgba(255,204,0,0.3);
}

/* BUTTON */
.btn-glitch{
    padding:15px 30px;
    background:var(--neon-gold);
    border:none;
    font-family:'Syncopate';
    cursor:pointer;
}

/* REVEAL */
.reveal{opacity:0;transform:translateY(40px);transition:1s;}
.reveal.active{opacity:1;transform:translateY(0);}

/* CHAT */
#ai-chat-btn{
    position:fixed;bottom:90px;right:25px;width:60px;height:60px;
    border:2px solid var(--neon-gold);border-radius:50%;
    display:flex;align-items:center;justify-content:center;
}
#chat-box{
    position:fixed;bottom:160px;right:25px;width:320px;height:420px;
    background:black;border:1px solid var(--neon-gold);
    display:none;flex-direction:column;
}
.bot-msg{color:var(--neon-gold);}
.user-msg{align-self:flex-end;}

.quick-btns button{
    margin:3px;padding:5px;
    border:1px solid var(--neon-gold);
    background:transparent;color:var(--neon-gold);
    cursor:pointer;
}
.quick-btns button:hover{
    background:var(--neon-gold);color:black;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>
<div id="cursor"></div>
<div class="grid-bg"></div>

<nav>
<a href="#home">Home</a>
<a href="#services">Services</a>
<a href="#contact">Contact</a>
</nav>

<header id="home">
<img src="GL_Logo.png" class="gl-logo">
<h1>GL PRINTS</h1>
<p>EST. 2025 | MUNTINLUPA CITY</p>
<button class="btn-glitch" onclick="location.href='#services'">ENTER</button>
</header>

<section id="services" class="container reveal">
<div class="tilt-card"><h3>PRINTS</h3><p>High quality printing</p></div>
<div class="tilt-card"><h3>DESIGN</h3><p>Creative layouts</p></div>
<div class="tilt-card"><h3>TECH</h3><p>Repairs & solutions</p></div>
</section>

<section id="contact" class="reveal" style="text-align:center;padding:80px;">
<h2>CONTACT</h2>
<p onclick="copyNumber()">0991 636 1742</p>
</section>

<!-- CHAT -->
<div id="ai-chat-btn" onclick="toggleChat()">💬</div>

<div id="chat-box">
<div>GL AI</div>
<div id="chat-display">
<p class="bot-msg">
Welcome 🚀
<div class="quick-btns">
<button onclick="quickAsk('price')">Price</button>
<button onclick="quickAsk('services')">Services</button>
<button onclick="quickAsk('location')">Location</button>
</div>
</p>
</div>
<input id="chat-input">
<button onclick="askAI()">Send</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>

<script>
// CURSOR
document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

// PARTICLES
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let p=[];
for(let i=0;i<80;i++){
p.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,dx:1,dy:1});
}

function anim(){
ctx.clearRect(0,0,canvas.width,canvas.height);
p.forEach(a=>{
a.x+=a.dx;a.y+=a.dy;
ctx.fillStyle="#ffcc00";
ctx.fillRect(a.x,a.y,2,2);
});
requestAnimationFrame(anim);
}
anim();

// REVEAL
window.addEventListener("scroll",()=>{
document.querySelectorAll(".reveal").forEach(el=>{
if(el.getBoundingClientRect().top < window.innerHeight-100){
el.classList.add("active");
}
});
});

// CHAT
function toggleChat(){
let box=document.getElementById("chat-box");
box.style.display=box.style.display==="flex"?"none":"flex";
}

function quickAsk(t){
document.getElementById("chat-input").value=t;
askAI();
}

function askAI(){
let input=document.getElementById("chat-input");
let msg=input.value;
let display=document.getElementById("chat-display");

display.innerHTML+=`<div class="user-msg">${msg}</div>`;
display.innerHTML+=`<div class="bot-msg">Processing...</div>`;
input.value="";
}

// COPY
function copyNumber(){
navigator.clipboard.writeText("09916361742");
alert("Copied!");
}

// TILT
VanillaTilt.init(document.querySelectorAll(".tilt-card"));
</script>

</body>
</html>
