<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLP NEXUS | Muntinlupa</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@300;500&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/@splinetool/viewer@0.9.431/build/spline-viewer.js"></script>
    
    <style>
        :root {
            --neon-gold: #ffcc00;
            --bg-black: #050505;
            --glass: rgba(10, 10, 10, 0.8);
            --border: rgba(255, 204, 0, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-black); color: white; font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; }

        /* LAYER 1: 3D BACKGROUND (Fixed & Bottom) */
        #bg-3d {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none; /* Para ma-click mo pa rin yung text sa harap */
        }

        /* LAYER 2: SCROLLABLE CONTENT (Middle) */
        #main-content {
            position: relative;
            z-index: 2;
            width: 100%;
            min-height: 100vh;
        }

        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            pointer-events: none; /* Allow click through to 3D if needed */
        }

        .hero-text { pointer-events: auto; }

        h1 { font-family: 'Syncopate'; font-size: clamp(2.5rem, 8vw, 5rem); color: var(--neon-gold); letter-spacing: 10px; }

        /* LAYER 3: UI OVERLAYS (Navigation & Chat - Top) */
        nav {
            position: fixed;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: var(--glass);
            padding: 12px 25px;
            border-radius: 50px;
            border: 1px solid var(--border);
            display: flex; gap: 20px;
            z-index: 100; /* Pinaka-ibabaw */
            backdrop-filter: blur(10px);
        }

        nav a { color: white; text-decoration: none; font-size: 10px; font-family: 'Syncopate'; }

        /* AI CHAT UI FIX */
        #chat-trigger {
            position: fixed;
            bottom: 85px; right: 25px;
            width: 55px; height: 55px;
            background: var(--neon-gold);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 101;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
        }

        #chat-window {
            position: fixed;
            bottom: 150px; right: 25px;
            width: min(350px, 85vw);
            height: 450px;
            background: var(--glass);
            border: 1px solid var(--neon-gold);
            border-radius: 20px;
            display: none; flex-direction: column;
            z-index: 102;
            backdrop-filter: blur(20px);
            overflow: hidden;
        }

        .chat-header { background: var(--neon-gold); color: black; padding: 12px; font-family: 'Syncopate'; font-size: 10px; font-weight: bold; }
        #chat-logs { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bot { color: var(--neon-gold); font-size: 14px; border-left: 2px solid var(--neon-gold); padding-left: 10px; }
        .user { align-self: flex-end; background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 10px; font-size: 14px; }

        .input-box { display: flex; border-top: 1px solid var(--border); }
        input { flex: 1; background: transparent; border: none; color: white; padding: 15px; outline: none; }
        #send-btn { background: var(--neon-gold); border: none; padding: 0 20px; cursor: pointer; font-family: 'Syncopate'; font-size: 10px; }

        /* Shards Grid */
        .grid {
            max-width: 1100px;
            margin: 50px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .shard {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 40px 20px;
            border-radius: 20px;
            transition: 0.3s;
            text-align: center;
        }

        .shard:hover { border-color: var(--neon-gold); transform: translateY(-5px); }
        .shard h3 { color: var(--neon-gold); font-family: 'Syncopate'; font-size: 1rem; margin-bottom: 10px; }

    </style>
</head>
<body>

    <spline-viewer id="bg-3d" url="https://prod.spline.design/bWwXl30L-9U6M6fM/scene.splinecode"></spline-viewer>

    <nav>
        <a href="#home">Home</a>
        <a href="#services">Services</a>
        <a href="https://m.me/GLprinting.services/" target="_blank">Contact</a>
    </nav>

    <div id="chat-trigger" onclick="toggleChat()">🤖</div>
    
    <div id="chat-window">
        <div class="chat-header">GL SYSTEM AI</div>
        <div id="chat-logs">
            <p class="bot">System online. What is your request?</p>
        </div>
        <div class="input-box">
            <input type="text" id="chat-in" placeholder="Type keyword...">
            <button id="send-btn" onclick="talkToAI()">GO</button>
        </div>
    </div>

    <main id="main-content">
        <header id="home">
            <div class="hero-text">
                <h1>GL PRINTS</h1>
                <p style="letter-spacing: 5px; opacity: 0.6;">3D TECH & PRINT SOLUTIONS</p>
            </div>
        </header>

        <section class="grid" id="services">
            <div class="shard">
                <h3>PRINTS & MEDIA</h3>
                <p>Events, Stickers, Photo Develop.</p>
            </div>
            <div class="shard">
                <h3>TECH SOLUTIONS</h3>
                <p>Laptop/Phone Repair & Reformat.</p>
            </div>
            <div class="shard">
                <h3>DIGITAL OFFICE</h3>
                <p>E-Gov, Encoding, Resume Assist.</p>
            </div>
        </section>
    </main>

    <script>
        function toggleChat() {
            const win = document.getElementById('chat-window');
            win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
        }

        const brain = {
            "price": "Check our price list: <br>• B&W: ₱4-₱6<br>• Colored: ₱6-₱30<br>• Stickers: ₱50/sheet",
            "repair": "Tech Check: ₱300-₱800 software, Hardware varies. FREE Checkup!",
            "location": "Muntinlupa City Sector. Open for walk-ins!",
            "default": "Command not recognized. Chat us on Messenger for human support."
        };

        function talkToAI() {
            const input = document.getElementById('chat-in');
            const logs = document.getElementById('chat-logs');
            const val = input.value.toLowerCase();
            if(!val) return;

            logs.innerHTML += `<div class="user">${input.value}</div>`;
            input.value = "";

            let reply = brain["default"];
            if(val.includes("magkano") || val.includes("price")) reply = brain["price"];
            if(val.includes("sira") || val.includes("repair")) reply = brain["repair"];
            if(val.includes("saan") || val.includes("location")) reply = brain["location"];

            setTimeout(() => {
                logs.innerHTML += `<div class="bot"><b>AI:</b><br>${reply}</div>`;
                logs.scrollTop = logs.scrollHeight;
            }, 600);
        }

        document.getElementById('chat-in').addEventListener('keydown', (e) => { if (e.key === "Enter") talkToAI(); });
    </script>
</body>
</html>
