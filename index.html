<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GL PRINTS | Official Terminal</title>
    <link rel="icon" type="image/png" href="img/GL_Logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --neon-gold: #ffcc00;
            --deep: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 204, 0, 0.3);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--deep); color: white; font-family: 'Space Grotesk'; overflow-x: hidden; }

        /* COVER PAGE */
        #cover-page {
            height: 100vh; width: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; background: radial-gradient(circle at center, rgba(255,204,0,0.08) 0%, rgba(0,0,0,1) 85%);
            position: fixed; top: 0; left: 0; z-index: 9999;
            transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1);
        }
        #cover-page.exit { transform: translateY(-100%); }
        .gl-logo-cover { width: 120px; filter: drop-shadow(0 0 20px var(--neon-gold)); margin-bottom: 20px; }

        /* MAIN SYSTEM */
        #main-system { opacity: 0; transition: 1s; visibility: hidden; position: relative; z-index: 1; }
        #terminal-sector { padding: 40px 5%; max-width: 550px; margin: 0 auto; }
        .terminal-card { background: #111; border: 1px solid var(--glass-border); padding: 25px; border-radius: 24px; box-shadow: 0 0 40px rgba(0,0,0,1); }
        .scanner-box { border: 2px dashed #333; padding: 30px 15px; text-align: center; border-radius: 15px; background: #080808; margin: 15px 0; cursor: pointer; }
        
        label { font-size: 0.55rem; color: #888; display: block; margin: 12px 0 5px; font-weight: bold; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #222; background: #000; color: #fff; outline: none; }
        
        .btn-add { background: var(--neon-gold); color: #000; width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 20px; font-family: 'Syncopate'; font-size: 0.65rem; }
        .btn-glitch { margin-top: 15px; padding: 15px 35px; background: transparent; border: 1px solid var(--neon-gold); color: var(--neon-gold); font-family: 'Syncopate'; font-size: 0.7rem; letter-spacing: 3px; cursor: pointer; transition: 0.4s; }

        /* 30s OVERLAY */
        #receipt-preview-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 10000; display: none; 
            flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        #payment-section { background: white; padding: 20px; border-radius: 20px; text-align: center; color: black; width: 90%; max-width: 350px; }
        
        /* PINAKAMAHALAGA: QR STYLE PARA MA-SCAN */
        #qr-image { 
            width: 100%; 
            height: auto; 
            display: block; 
            margin: 10px auto;
            border: 5px solid #fff; /* White border helps scanners */
        }
        
        .loader { width: 100%; height: 10px; background: #f0f0f0; border-radius: 10px; margin-top: 15px; overflow: hidden; position: relative; }
        .loader-fill { height: 100%; background: #007bff; width: 0%; transition: 30s linear; }

        #preview-canvas-container { background: white; padding: 10px; border-radius: 8px; max-width: 95%; max-height: 75vh; overflow-y: auto; display: none; }

        /* RECEIPT (Hidden) */
        #receipt-box { background: white; color: black; padding: 35px; width: 380px; position: absolute; left: -9999px; font-family: 'Courier New', monospace; }
        .receipt-header { text-align: center; border-bottom: 2px dashed #000; padding-bottom: 15px; margin-bottom: 15px; }
        .receipt-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; font-weight: bold; }
    </style>
</head>

<body>

<section id="cover-page">
    <img src="img/GL_Logo.png" class="gl-logo-cover" alt="GL Logo">
    <h1 style="font-family:'Syncopate'; letter-spacing:8px; font-size: 1.5rem;">GL PRINTS</h1>
    <button class="btn-glitch" onclick="unlockSystem()">ACCESS TERMINAL</button>
</section>

<div id="main-system">
    <section id="terminal-sector">
        <div class="terminal-card">
            <h2 style="font-family:'Syncopate'; color:var(--neon-gold); text-align:center; font-size:0.9rem;">OFFICIAL TERMINAL</h2>
            <label>Client Name</label>
            <input type="text" id="cust-name" placeholder="Name..." required>

            <div class="scanner-box" onclick="document.getElementById('file-input').click()">
                <input type="file" id="file-input" style="display:none;" onchange="handleFile()">
                <div id="status-msg" style="font-weight:800; font-size:0.7rem;">TAP TO UPLOAD FILE</div>
                <div id="filename-display" style="font-size:0.55rem; color:var(--neon-gold); margin-top:5px;"></div>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <select id="paper-size"><option value="S">Short</option><option value="A4" selected>A4</option><option value="L">Long</option></select>
                <select id="print-type"><option value="bw_text">B&W Text</option><option value="c_full">Color Full</option></select>
            </div>

            <button class="btn-add" onclick="addToOrder()">ADD TO QUEUE</button>

            <div id="bundle-container" style="display:none; margin-top:20px;">
                <div id="order-list"></div>
                <h3 id="grand-total" style="text-align:center; color:var(--neon-gold); margin:15px 0;">₱0.00</h3>
                <button class="btn-glitch" style="width:100%;" onclick="runAutoFlow()">GENERATE RECEIPT</button>
            </div>
        </div>
    </section>
</div>

<div id="receipt-preview-overlay">
    <div id="payment-section">
        <p style="font-weight:bold; font-size:1rem; margin-bottom:5px; color:#0052da;">GCASH PAYMENT</p>
        <p style="font-size:0.7rem; color:#555; margin-bottom:10px;">Scan to pay via GL PRINTS QR</p>
        
        <img src="img/Gcash Payment_QR.jpg" id="qr-image" alt="Gcash Payment QR">
        
        <div class="loader"><div class="loader-fill" id="l-fill"></div></div>
        <p style="font-size:0.7rem; margin-top:10px; font-weight:bold; color:#000;">Processing... please wait 30s</p>
    </div>

    <div id="preview-canvas-container"></div>
    <button class="btn-add" style="background:#ff4444; color:white; max-width:180px; margin-top:20px;" onclick="location.reload()">CANCEL / RESET</button>
</div>

<div id="receipt-box">
    <div class="receipt-header"><h1>GL PRINTS</h1><p>Muntinlupa City</p></div>
    <div id="receipt-items-list"></div>
    <div class="receipt-row" style="border-top:2px solid #000; padding-top:10px; margin-top:10px;">
        <span>TOTAL:</span><span id="receipt-grand-total">₱0.00</span>
    </div>
    <div style="text-align:center; font-size:9px; margin-top:20px;">
        <p>Ref: <span id="ref-id"></span></p>
        <p id="receipt-date"></p>
        <p style="font-weight:bold; border:1px solid #000; padding:5px; margin-top:5px;">STATUS: PAID ✅</p>
    </div>
</div>

<script>
    const TG_TOKEN = '8621389622:AAFFAGg6bTitSp9VtVHdcXCd2GegOTy4gNk';
    const TG_ID = '7541789801';
    let orderQueue = [];
    const prices = { bw_text: { S: 4, A4: 5, L: 6 }, c_full: { S: 8, A4: 10, L: 15 } };

    function unlockSystem() {
        document.getElementById('cover-page').classList.add('exit');
        document.getElementById('main-system').style.visibility = 'visible';
        document.getElementById('main-system').style.opacity = '1';
    }

    function handleFile() {
        const file = document.getElementById('file-input').files[0];
        if(file) document.getElementById('filename-display').innerText = file.name;
    }

    function addToOrder() {
        const name = document.getElementById('cust-name').value;
        if(!name) return alert("Enter Customer Name");
        const price = prices[document.getElementById('print-type').value][document.getElementById('paper-size').value];
        orderQueue.push({ name: document.getElementById('print-type').value.toUpperCase(), meta: document.getElementById('paper-size').value, price: price });
        
        let total = 0;
        document.getElementById('order-list').innerHTML = "";
        orderQueue.forEach(item => {
            total += item.price;
            document.getElementById('order-list').innerHTML += `<div class="receipt-row" style="color:white;"><span>${item.name} (${item.meta})</span><span>₱${item.price.toFixed(2)}</span></div>`;
        });
        document.getElementById('grand-total').innerText = `₱${total.toFixed(2)}`;
        document.getElementById('bundle-container').style.display = 'block';
    }

    async function runAutoFlow() {
        document.getElementById('receipt-preview-overlay').style.display = 'flex';
        setTimeout(() => { document.getElementById('l-fill').style.width = '100%'; }, 100);

        document.getElementById('receipt-items-list').innerHTML = document.getElementById('order-list').innerHTML;
        document.getElementById('receipt-items-list').querySelectorAll('div').forEach(d => d.style.color = 'black');
        document.getElementById('receipt-grand-total').innerText = document.getElementById('grand-total').innerText;
        document.getElementById('ref-id').innerText = "GL-" + Date.now().toString().slice(-6);
        document.getElementById('receipt-date').innerText = new Date().toLocaleString();

        setTimeout(async () => {
            document.getElementById('payment-section').style.display = 'none';
            const container = document.getElementById('preview-canvas-container');
            container.style.display = 'block';

            const canvas = await html2canvas(document.getElementById('receipt-box'));
            container.innerHTML = ""; container.appendChild(canvas);

            canvas.toBlob(blob => {
                sendToTG(blob);
            }, 'image/png');
        }, 30000); 
    }

    async function sendToTG(blob) {
        const name = document.getElementById('cust-name').value;
        const file = document.getElementById('file-input').files[0];
        
        fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: TG_ID, text: `✅ PAID ORDER: ${name}`, parse_mode: 'Markdown' })
        });

        if(file) {
            const fd = new FormData(); fd.append('chat_id', TG_ID); fd.append('document', file);
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendDocument`, { method: 'POST', body: fd });
        }

        const fd2 = new FormData(); fd2.append('chat_id', TG_ID); fd2.append('photo', blob, 'receipt.png');
        fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendPhoto`, { method: 'POST', body: fd2 });
    }
</script>
</body>
</html>
