<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLP Services | Muntinlupa</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-gold: #FFD700;
            --dark-bg: #0a0a0a;
            --card-bg: #151515;
            --text-gray: #b0b0b0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        #cursor {
            width: 20px; height: 20px;
            background: var(--neon-gold);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.1s ease;
        }

        /* Chat Bot UI */
        #chat-trigger {
            position: fixed; bottom: 20px; right: 20px;
            background: var(--neon-gold);
            width: 60px; height: 60px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 1000;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        #chat-box {
            position: fixed; bottom: 90px; right: 20px;
            width: 350px; height: 500px;
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 15px;
            display: none; flex-direction: column;
            z-index: 1000; overflow: hidden;
        }

        .chat-header {
            background: var(--neon-gold);
            color: black; padding: 15px;
            font-family: 'Syncopate', sans-serif;
            font-weight: bold; font-size: 0.8rem;
        }

        #chat-display {
            flex: 1; padding: 15px;
            overflow-y: auto; display: flex;
            flex-direction: column; gap: 10px;
        }

        .bot-msg { background: #222; padding: 10px; border-radius: 10px; align-self: flex-start; max-width: 85%; font-size: 0.9rem; border-left: 3px solid var(--neon-gold); }
        .user-msg { background: var(--neon-gold); color: black; padding: 10px; border-radius: 10px; align-self: flex-end; max-width: 85%; font-size: 0.9rem; }

        .chat-input-area { padding: 10px; display: flex; gap: 5px; background: #111; }
        #chat-input { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; }
        #chat-btn { background: var(--neon-gold); border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* Sample Section for Testing */
        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
        h1 { font-family: 'Syncopate', sans-serif; font-size: 3rem; color: var(--neon-gold); }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <section class="hero">
        <div class="tilt-card">
            <h1>GL PRINTS</h1>
            <p style="color:var(--text-gray)">Tech Solutions & Printing Services</p>
        </div>
    </section>

    <div id="chat-trigger" onclick="toggleChat()">💬</div>
    
    <div id="chat-box">
        <div class="chat-header">GL SYSTEM AI</div>
        <div id="chat-display">
            <p class="bot-msg">Welcome to GL Prints. How can I assist you today? (Keywords: Price, Location, Services, Repair)</p>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Type a keyword...">
            <button id="chat-btn" onclick="askAI()">SEND</button>
        </div>
    </div>

    <script>
        // 1. Utilities
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        function toggleChat() {
            const box = document.getElementById('chat-box');
            box.style.display = (box.style.display === 'flex') ? 'none' : 'flex';
        }

        // 2. AI Knowledge Base
        const glKnowledge = {
            "generic_price": {
                keywords: ["magkano", "how much", "presyo", "hm", "piso", "price", "amount"],
                response: `Para mabigyan kita ng accurate na presyo, ano ang specific na ipapagawa mo, Ma'am/Sir? <br><br><b style="color:var(--neon-gold)">Pumili ng category:</b><br>• Prints<br>• Photo Develop<br>• Rush ID<br>• Stickers<br>• Lamination<br>• Tech Repair`
            },
            "printing": {
                keywords: ["print", "colored", "black and white", "b&w", "document"],
                response: `Standard Rates:<br>• B&W: ₱4 - ₱6<br>• Colored: ₱6 - ₱15<br>• Full Color: ₱15 - ₱30`
            },
            "id_photos": {
                keywords: ["id", "1x1", "2x2", "instax", "polaroid", "locket", "id picture"],
                response: `Rush ID & Photos:<br>• ID Bundle: ₱35 - ₱100<br>• Instax Style: ₱30 - ₱45<br>• Locket Size: ₱20 - ₱40`
            },
            "lamination": {
                keywords: ["lamination", "laminate", "plastic", "cover"],
                response: `Lamination Rates:<br>• ID Size: ₱15 - ₱25<br>• Short/A4/Long: ₱30 - ₱60`
            },
            "stickers": {
                keywords: ["sticker", "label", "glossy", "matte"],
                response: `Custom Stickers:<br>• Per A4 Sheet: ₱50 - ₱85 depede sa material.`
            },
            "repair": {
                keywords: ["repair", "ayos", "sira", "lcd", "battery", "laptop", "iphone", "samsung", "realme", "infinix"],
                response: `Technical Services:<br>• Software/Reformat: ₱300+<br>• Hardware: ₱800+<br><b>FREE Check-up sa shop!</b>`
            },
            "location": {
                keywords: ["saan", "location", "address", "muntinlupa", "mapa"],
                response: `Nasa Muntinlupa City lang kami! <br><br>📍 <a href="#" style="color:white">Open Google Maps</a>`
            },
            "owner": {
                keywords: ["sino", "owner", "lria", "ry"],
                response: "The system is owned by <b>Ate Ry (Lria)</b> 👑"
            },
            "default": "Para sa ibang detalye, best na kausapin ang aming team sa Messenger: <a href='https://m.me/GLprinting.services/' target='_blank' style='color:white'>Chat with us!</a>"
        };

        // 3. Main AI Function
        function askAI() {
            const input = document.getElementById('chat-input');
            const display = document.getElementById('chat-display');
            const msgRaw = input.value.trim();
            const msg = msgRaw.toLowerCase();
            
            if (!msg) return;

            // Display User Message
            display.innerHTML += `<div class="user-msg">${msgRaw}</div>`;
            input.value = "";
            display.scrollTop = display.scrollHeight;

            // Typing Indicator
            const tid = "t-" + Date.now();
            display.innerHTML += `<p class="bot-msg" id="${tid}"><i>GL-AI is typing...</i></p>`;
            display.scrollTop = display.scrollHeight;

            let response = glKnowledge["default"];
            
            // Keyword Match Logic
            for (let key in glKnowledge) {
                if (glKnowledge[key].keywords && glKnowledge[key].keywords.some(k => msg.includes(k))) {
                    response = glKnowledge[key].response;
                    break;
                }
            }

            // Render Bot Response
            setTimeout(() => {
                const el = document.getElementById(tid);
                if (el) {
                    el.innerHTML = `<b>GL-AI:</b><br>${response}`;
                    el.style.fontStyle = "normal";
                }
                display.scrollTop = display.scrollHeight;
            }, 600);
        }

        // Enter Key Support
        document.getElementById('chat-input').addEventListener('keydown', (e) => {
            if (e.key === "Enter") askAI();
        });
    </script>
</body>
</html>
