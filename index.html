<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GL PRINTS | Muntinlupa City</title>
<link rel="icon" type="image/png" href="GL_Logo.png">

<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500&display=swap" rel="stylesheet">

<style>
:root {
    --gold:#ffcc00;
    --dark:#0a0a0a;
}

/* GLOBAL */
body{
    margin:0;
    font-family:'Space Grotesk';
    background:var(--dark);
    color:white;
    overflow-x:hidden;
}

/* FALLING PARTICLES */
#particles{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}

/* HEADER */
header{
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
}

.gl-logo{
    width:120px;
    animation:float 4s infinite;
    filter:drop-shadow(0 0 15px var(--gold));
}
@keyframes float{50%{transform:translateY(-10px);}}

h1{
    font-family:'Syncopate';
    font-size:4rem;
    letter-spacing:8px;
    background:linear-gradient(to right,#fff,var(--gold));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* NEW HERO BUTTON */
.hero-btn{
    margin-top:30px;
    padding:14px 35px;
    border-radius:30px;
    border:1px solid var(--gold);
    background:transparent;
    color:var(--gold);
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}
.hero-btn:hover{
    background:var(--gold);
    color:black;
    box-shadow:0 0 20px var(--gold);
}

/* NAV */
nav{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:20px;
}
nav a{
    color:white;
    text-decoration:none;
    position:relative;
}
nav a::after{
    content:"";
    width:0;
    height:2px;
    background:var(--gold);
    position:absolute;
    bottom:-5px;
    left:0;
    transition:0.3s;
}
nav a:hover::after{width:100%;}
nav a:hover{color:var(--gold);}

/* SERVICES */
.container{
    padding:80px 5%;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}
.card{
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.1);
    padding:25px;
    border-radius:20px;
    transition:0.3s;
}
.card:hover{
    transform:translateY(-8px);
    border-color:var(--gold);
    box-shadow:0 0 25px rgba(255,204,0,0.3);
}

/* CHAT BUTTON */
#ai-btn{
    position:fixed;
    bottom:90px;
    right:25px;
    width:60px;height:60px;
    border-radius:50%;
    border:2px solid var(--gold);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

/* CHAT BOX */
#chat-box{
    position:fixed;
    bottom:160px;
    right:25px;
    width:340px;
    height:480px;
    background:#000;
    border:1px solid var(--gold);
    border-radius:15px;
    display:none;
    flex-direction:column;
}

/* CHAT DISPLAY */
#chat-display{
    flex:1;
    padding:15px;
    overflow-y:auto;
}

/* BOT */
.bot{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}
.bot img{
    width:30px;height:30px;border-radius:50%;
}
.bot div{
    background:rgba(255,204,0,0.1);
    padding:10px;
    border-radius:10px;
    color:var(--gold);
}

/* USER */
.user{
    text-align:right;
    margin-bottom:10px;
}
.user span{
    background:#222;
    padding:10px;
    border-radius:10px;
}

/* INPUT AREA */
.chat-input{
    display:flex;
    padding:10px;
    border-top:1px solid var(--gold);
    background:#111;
}
.chat-input input{
    flex:1;
    padding:12px;
    border:none;
    outline:none;
    background:#000;
    color:white;
    border-radius:10px;
}
.chat-input button{
    margin-left:5px;
    padding:10px 15px;
    border:none;
    background:var(--gold);
    cursor:pointer;
    border-radius:10px;
}

/* FB BUTTON */
.fb-btn{
    display:block;
    text-align:center;
    margin-top:10px;
    padding:10px;
    background:var(--gold);
    color:black;
    text-decoration:none;
    border-radius:10px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<nav>
<a href="#home">Home</a>
<a href="#services">Services</a>
<a href="#contact">Contact</a>
</nav>

<header id="home">
<img src="GL_Logo.png" class="gl-logo">
<h1>GL PRINTS</h1>
<p>MUNTINLUPA CITY</p>
<button class="hero-btn" onclick="location.href='#services'">Explore Services</button>
</header>

<section id="services" class="container">
<div class="card">EVENT PRINTS</div>
<div class="card">DIGITAL DESIGN</div>
<div class="card">E-GOV ASSIST</div>
<div class="card">TECH ASSIST</div>
<div class="card">TECH SOLUTIONS</div>
<div class="card">SPECIAL SERVICES</div>
</section>

<section id="contact" style="text-align:center;padding:60px;">
<h2>Contact</h2>
<p onclick="navigator.clipboard.writeText('09916361742')">0991 636 1742</p>
</section>

<!-- CHAT -->
<div id="ai-btn" onclick="toggleChat()">
<img src="GL_Logo.png" width="35">
</div>

<div id="chat-box">
<div id="chat-display">
<div class="bot">
<img src="GL_Logo.png">
<div>
Welcome to GL Prints 🚀
<a href="https://www.facebook.com/GLprinting.services/" target="_blank" class="fb-btn">Message us on Facebook</a>
</div>
</div>
</div>

<div class="chat-input">
<input id="msg" placeholder="Type your message...">
<button onclick="send()">Send</button>
</div>
</div>

<script>
// PARTICLES (FALLING EFFECT)
const c=document.getElementById("particles");
const x=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let drops=[];
for(let i=0;i<100;i++){
drops.push({x:Math.random()*c.width,y:Math.random()*c.height,s:2});
}

function rain(){
x.clearRect(0,0,c.width,c.height);
drops.forEach(d=>{
d.y+=2;
if(d.y>c.height)d.y=0;
x.fillStyle="#ffcc00";
x.fillRect(d.x,d.y,d.s,d.s*3);
});
requestAnimationFrame(rain);
}
rain();

// CHAT
function toggleChat(){
let box=document.getElementById("chat-box");
box.style.display=box.style.display==="flex"?"none":"flex";
}

function send(){
let input=document.getElementById("msg");
let val=input.value;
if(!val)return;

let display=document.getElementById("chat-display");

display.innerHTML+=`<div class="user"><span>${val}</span></div>`;
display.innerHTML+=`
<div class="bot">
<img src="GL_Logo.png">
<div>Thanks! Please message us on Facebook for full service details.</div>
</div>`;

display.scrollTop=display.scrollHeight;
input.value="";
}
</script>

</body>
</html>
