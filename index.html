<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GL PRINTS | Official Terminal</title>
    <link rel="icon" type="image/png" href="img/GL_Logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --neon-gold: #ffcc00;
            --deep: #0a0a0a;
            --glass-border: rgba(255, 204, 0, 0.3);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--deep); color: white; font-family: 'Space Grotesk'; overflow-x: hidden; }

        /* COVER PAGE */
        #cover-page {
            height: 100vh; width: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; background: radial-gradient(circle at center, rgba(255,204,0,0.08) 0%, rgba(0,0,0,1) 85%);
            position: fixed; top: 0; left: 0; z-index: 9999;
            transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1);
        }
        #cover-page.exit { transform: translateY(-100%); }
        .gl-logo-cover { width: 100px; filter: drop-shadow(0 0 15px var(--neon-gold)); margin-bottom: 20px; }

        /* MAIN SYSTEM */
        #main-system { opacity: 0; transition: 1s; visibility: hidden; }
        #terminal-sector { padding: 30px 5%; max-width: 500px; margin: 0 auto; }
        .terminal-card { background: #111; border: 1px solid var(--glass-border); padding: 20px; border-radius: 20px; }
        
        label { font-size: 0.6rem; color: #888; display: block; margin: 10px 0 5px; font-weight: bold; }
        select, input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #222; background: #000; color: #fff; outline: none; }
        
        .btn-add { background: var(--neon-gold); color: #000; width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; margin-top: 15px; font-family: 'Syncopate'; font-size: 0.6rem; }
        .btn-glitch { margin-top: 15px; padding: 12px 25px; background: transparent; border: 1px solid var(--neon-gold); color: var(--neon-gold); font-family: 'Syncopate'; font-size: 0.65rem; cursor: pointer; }

        /* PAYMENT OVERLAY */
        #receipt-preview-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 10000; display: none; 
            flex-direction: column; align-items: center; justify-content: center; padding: 15px;
            overflow-y: auto;
        }
        #payment-section { background: white; padding: 20px; border-radius: 20px; text-align: center; color: black; width: 100%; max-width: 340px; }
        #qr-image { width: 100%; max-width: 250px; border: 4px solid #fff; margin: 10px 0; }
        
        .proof-upload { border: 2px dashed #ccc; padding: 15px; border-radius: 10px; margin-top: 10px; cursor: pointer; background: #f9f9f9; }

        #preview-canvas-container { background: white; padding: 10px; border-radius: 8px; max-width: 95%; display: none; margin-top: 20px; }

        /* RECEIPT (Hidden) */
        #receipt-box { background: white; color: black; padding: 30px; width: 350px; position: absolute; left: -9999px; font-family: 'Courier New', monospace; }
        .receipt-header { text-align: center; border-bottom: 2px dashed #000; padding-bottom: 10px; margin-bottom: 10px; }
        .receipt-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
    </style>
</head>

<body>

<section id="cover-page">
    <img src="img/GL_Logo.png" class="gl-logo-cover">
    <h1 style="font-family:'Syncopate'; letter-spacing:5px; font-size: 1.2rem;">GL PRINTS</h1>
    <button class="btn-glitch" onclick="unlockSystem()">ENTER TERMINAL</button>
</section>

<div id="main-system">
    <section id="terminal-sector">
        <div class="terminal-card">
            <h2 style="font-family:'Syncopate'; color:var(--neon-gold); text-align:center; font-size:0.8rem; margin-bottom:15px;">PRINTING TERMINAL</h2>
            
            <label>Customer Name</label>
            <input type="text" id="cust-name" placeholder="Name..." required>

            <label>Attach File to Print</label>
            <input type="file" id="file-to-print" onchange="updateFileName()">
            <div id="print-filename" style="font-size:0.6rem; color:var(--neon-gold); margin-top:5px;"></div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                <select id="paper-size"><option value="S">Short</option><option value="A4" selected>A4</option><option value="L">Long</option></select>
                <select id="print-type"><option value="bw_text">B&W Text</option><option value="c_full">Color Full</option></select>
            </div>

            <button class="btn-add" onclick="addToQueue()">ADD TO LIST</button>

            <div id="queue-box" style="display:none; margin-top:20px; border-top:1px solid #333; padding-top:15px;">
                <div id="order-list"></div>
                <h2 id="grand-total" style="text-align:center; color:var(--neon-gold); margin:15px 0;">₱0.00</h2>
                <button class="btn-glitch" style="width:100%;" onclick="showPayment()">PROCEED TO PAYMENT</button>
            </div>
        </div>
    </section>
</div>

<div id="receipt-preview-overlay">
    <div id="payment-section">
        <p style="font-weight:bold; color:#0052da;">GCASH QR PAYMENT</p>
        <img src="img/Gcash Payment_QR.jpg" id="qr-image" alt="GCash QR">
        
        <div class="proof-upload" onclick="document.getElementById('proof-input').click()">
            <p id="proof-status" style="font-size:0.7rem; font-weight:bold;">UPLOAD GCASH RECEIPT HERE</p>
            <input type="file" id="proof-input" style="display:none;" accept="image/*" onchange="checkProof()">
        </div>

        <button id="final-gen-btn" class="btn-add" style="opacity:0.3; cursor:not-allowed;" disabled onclick="generateFinalReceipt()">GENERATE OFFICIAL RECEIPT</button>
    </div>

    <div id="preview-canvas-container"></div>
    <button class="btn-add" style="background:#ff4444; color:white; max-width:150px; margin-top:15px;" onclick="location.reload()">CANCEL</button>
</div>

<div id="receipt-box">
    <div class="receipt-header"><h3>GL PRINTS</h3><p>Official Receipt</p></div>
    <div id="receipt-items"></div>
    <div class="receipt-row" style="border-top:1px solid #000; margin-top:10px; padding-top:10px; font-weight:bold;">
        <span>TOTAL PAID:</span><span id="receipt-total">₱0.00</span>
    </div>
    <div style="text-align:center; font-size:10px; margin-top:20px;">
        <p>Ref: <span id="ref-id"></span></p>
        <p id="receipt-date"></p>
        <p style="margin-top:10px; border:1px solid #000; padding:3px;">PAYMENT VERIFIED via GCASH</p>
    </div>
</div>

<script>
    const TG_TOKEN = '8621389622:AAFFAGg6bTitSp9VtVHdcXCd2GegOTy4gNk';
    const TG_ID = '7541789801';
    let queue = [];
    const rates = { bw_text: { S: 4, A4: 5, L: 6 }, c_full: { S: 8, A4: 10, L: 15 } };

    function unlockSystem() {
        document.getElementById('cover-page').classList.add('exit');
        document.getElementById('main-system').style.visibility = 'visible';
        document.getElementById('main-system').style.opacity = '1';
    }

    function updateFileName() {
        const file = document.getElementById('file-to-print').files[0];
        document.getElementById('print-filename').innerText = file ? "📄 " + file.name : "";
    }

    function addToQueue() {
        if(!document.getElementById('cust-name').value) return alert("Enter Name");
        const type = document.getElementById('print-type').value;
        const size = document.getElementById('paper-size').value;
        const price = rates[type][size];

        queue.push({ name: type.toUpperCase(), info: size, price: price });
        renderQueue();
    }

    function renderQueue() {
        let total = 0;
        let html = "";
        queue.forEach(item => {
            total += item.price;
            html += `<div class="receipt-row"><span>${item.name} (${item.info})</span><span>₱${item.price.toFixed(2)}</span></div>`;
        });
        document.getElementById('order-list').innerHTML = html;
        document.getElementById('grand-total').innerText = `₱${total.toFixed(2)}`;
        document.getElementById('queue-box').style.display = 'block';
    }

    function showPayment() {
        if(!document.getElementById('file-to-print').files[0]) return alert("Please attach your file first!");
        document.getElementById('receipt-preview-overlay').style.display = 'flex';
    }

    function checkProof() {
        const proof = document.getElementById('proof-input').files[0];
        if(proof) {
            document.getElementById('proof-status').innerText = "✅ RECEIPT ATTACHED: " + proof.name;
            document.getElementById('final-gen-btn').style.opacity = "1";
            document.getElementById('final-gen-btn').style.cursor = "pointer";
            document.getElementById('final-gen-btn').disabled = false;
        }
    }

    async function generateFinalReceipt() {
        const container = document.getElementById('preview-canvas-container');
        const overlaySection = document.getElementById('payment-section');
        
        // Prepare Receipt Data
        document.getElementById('receipt-items').innerHTML = document.getElementById('order-list').innerHTML;
        document.getElementById('receipt-total').innerText = document.getElementById('grand-total').innerText;
        document.getElementById('ref-id').innerText = "GL-" + Date.now().toString().slice(-6);
        document.getElementById('receipt-date').innerText = new Date().toLocaleString();

        // Convert to Image
        const canvas = await html2canvas(document.getElementById('receipt-box'));
        overlaySection.style.display = 'none';
        container.style.display = 'block';
        container.innerHTML = "<h3>Generating Receipt...</h3>";
        container.appendChild(canvas);

        canvas.toBlob(blob => sendAllToTelegram(blob));
    }

    async function sendAllToTelegram(receiptBlob) {
        const name = document.getElementById('cust-name').value;
        const fileToPrint = document.getElementById('file-to-print').files[0];
        const gcashProof = document.getElementById('proof-input').files[0];

        // 1. Send Text Notification
        await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                chat_id: TG_ID, 
                text: `🆕 *NEW ORDER FROM: ${name}*\nTotal: ${document.getElementById('grand-total').innerText}`, 
                parse_mode: 'Markdown' 
            })
        });

        // 2. Send File to Print
        const fd1 = new FormData(); fd1.append('chat_id', TG_ID); fd1.append('document', fileToPrint);
        fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendDocument`, { method: 'POST', body: fd1 });

        // 3. Send GCash Proof (Screenshot)
        const fd2 = new FormData(); fd2.append('chat_id', TG_ID); fd2.append('photo', gcashProof);
        fd2.append('caption', `GCash Proof for ${name}`);
        fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendPhoto`, { method: 'POST', body: fd2 });

        // 4. Send GL Prints Receipt
        const fd3 = new FormData(); fd3.append('chat_id', TG_ID); fd3.append('photo', receiptBlob, 'receipt.png');
        fd3.append('caption', `Official Receipt for ${name}`);
        await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendPhoto`, { method: 'POST', body: fd3 });

        alert("Order submitted successfully! Please wait for your print.");
    }
</script>
</body>
</html>
