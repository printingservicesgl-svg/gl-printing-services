<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GL ENCODER | PREMIUM DOCUMENT SYSTEM</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #00f2ff;
            --success: #00ff88;
            --bg-dark: #0f0f12;
            --panel-bg: #1a1a1f;
            --border: #2d2d35;
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Sidebar Fix: Multi-section Flex --- */
        .sidebar {
            width: 340px;
            background: var(--panel-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-shadow: 15px 0 40px rgba(0,0,0,0.4);
            z-index: 100;
        }

        .sidebar-header {
            padding: 25px 25px 15px 25px;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto; /* Dito mag-sscroll ang settings pag mahaba */
            padding: 0 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .sidebar-footer {
            padding: 20px 25px;
            border-top: 1px solid var(--border);
            background: rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .brand h1 {
            font-size: 22px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 30%, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .control-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .label-sm {
            font-size: 10px;
            font-weight: bold;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* --- Buttons & Inputs --- */
        .btn-tool {
            width: 100%;
            padding: 10px;
            background: #25252b;
            border: 1px solid var(--border);
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-tool:hover { background: var(--accent); color: #000; }
        .btn-accent { background: var(--accent); color: #000; font-weight: 800; }
        .btn-success { background: var(--success); color: #000; font-weight: 800; }

        .tool-row { display: flex; gap: 5px; }
        .tool-row .btn-tool { flex: 1; }

        select, textarea {
            background: #000;
            color: #fff;
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 6px;
            font-size: 13px;
        }

        input[type="color"] {
            width: 100%;
            height: 30px;
            border: none;
            background: transparent;
            cursor: pointer;
        }

        /* --- Workspace --- */
        .main { flex: 1; display: flex; background: #050507; }

        .source-view {
            width: 260px;
            background: rgba(0,0,0,0.3);
            border-right: 1px solid var(--border);
            padding: 15px;
            overflow-y: auto;
        }

        .editor-view {
            flex: 1;
            padding: 20px;
            overflow: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: radial-gradient(circle at 2px 2px, #222 1px, transparent 0);
            background-size: 30px 30px;
            position: relative;
        }

        #canvas-wrapper {
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            border: 1px solid #444;
        }

        .zoom-ui {
            position: absolute;
            bottom: 30px;
            background: rgba(20,20,25,0.9);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 50px;
            display: flex;
            gap: 15px;
            align-items: center;
            border: 1px solid var(--border);
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <div class="brand"><h1>GL ENCODER <span style="font-size:12px; color:var(--accent)">PRO</span></h1></div>
    </div>

    <div class="sidebar-content">
        <div class="status-box">
            <div id="status-msg" class="label-sm" style="color:var(--accent); margin-bottom:5px">System Ready</div>
            <div style="height:3px; background:#222; border-radius:5px; overflow:hidden;">
                <div id="progress-bar" style="width:0%; height:100%; background:var(--accent); transition:0.3s;"></div>
            </div>
        </div>

        <button class="btn-tool btn-accent" onclick="document.getElementById('file-upload').click()">+ UPLOAD DOCUMENT</button>
        <input type="file" id="file-upload" style="display:none" accept="image/*">

        <div class="control-card">
            <span class="label-sm">Document Layout</span>
            <select id="paper-size" onchange="adjustCanvas()">
                <option value="letter">Short Bond (8.5 x 11)</option>
                <option value="a4">A4 Standard</option>
                <option value="long">Long Bond (8.5 x 13)</option>
            </select>
            <select id="font-family" onchange="updateFontStyle()">
                <option value="'Times New Roman', serif">Times New Roman</option>
                <option value="'Inter', sans-serif">Modern Sans</option>
                <option value="'Courier New', monospace">Typewriter</option>
            </select>
        </div>

        <div class="control-card">
            <span class="label-sm">Text Formatting</span>
            <div class="tool-row">
                <button class="btn-tool" onclick="setTextAlign('left')">Left</button>
                <button class="btn-tool" onclick="setTextAlign('center')">Center</button>
                <button class="btn-tool" onclick="setTextAlign('right')">Right</button>
            </div>
            <div class="tool-row" style="align-items:center;">
                <span class="label-sm" style="margin-right:10px">Color:</span>
                <input type="color" id="text-color" value="#000000" onchange="setTextColor(this.value)">
            </div>
        </div>

        <div class="control-card">
            <span class="label-sm">Quick Editor</span>
            <textarea id="edit-box" rows="3" placeholder="Select text to edit..."></textarea>
        </div>
    </div>

    <div class="sidebar-footer">
        <button class="btn-tool btn-success" onclick="savePDF()">EXPORT TO PDF</button>
        <button class="btn-tool" onclick="location.reload()">RESET SYSTEM</button>
    </div>
</div>

<div class="main">
    <div class="source-view">
        <span class="label-sm" style="display:block; margin-bottom:10px">Reference</span>
        <img id="ref-image" style="width: 100%; border-radius: 4px; filter: contrast(1.1);">
        <div style="margin-top:15px; font-size:10px; color:#555; line-height:1.6">
            • Scroll to Zoom Canvas<br>
            • Backspace to Delete Text<br>
            • Drag text to reposition
        </div>
    </div>
    
    <div class="editor-view">
        <div id="canvas-wrapper">
            <canvas id="main-canvas"></canvas>
        </div>

        <div class="zoom-ui">
            <button onclick="zoomCanvas(-0.1)" style="background:none; border:none; color:#fff; cursor:pointer;">−</button>
            <span id="zoom-text" style="font-weight:bold; font-size:12px; width:40px; text-align:center;">80%</span>
            <button onclick="zoomCanvas(0.1)" style="background:none; border:none; color:#fff; cursor:pointer;">+</button>
        </div>
    </div>
</div>

<script>
    const paperSizes = {
        letter: { w: 816, h: 1056 },
        a4: { w: 794, h: 1123 },
        long: { w: 816, h: 1248 }
    };

    let zoom = 0.8;
    const canvas = new fabric.Canvas('main-canvas', { 
        backgroundColor: '#fff',
        width: paperSizes.letter.w,
        height: paperSizes.letter.h
    });

    // File Upload & OCR
    document.getElementById('file-upload').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            document.getElementById('ref-image').src = event.target.result;
            document.getElementById('status-msg').innerText = "Starting OCR...";
            
            Tesseract.recognize(event.target.result, 'eng', {
                logger: m => {
                    if(m.status === 'recognizing text') {
                        const p = Math.round(m.progress * 100);
                        document.getElementById('progress-bar').style.width = p + "%";
                        document.getElementById('status-msg').innerText = `Analyzing: ${p}%`;
                    }
                }
            }).then(({ data: { lines } }) => {
                canvas.clear();
                canvas.setBackgroundColor('#fff', canvas.renderAll.bind(canvas));
                lines.forEach((line, i) => {
                    const txt = line.text.replace(/[^a-zA-Z0-9\s.,/-]/g, '').trim();
                    if(txt.length > 1) {
                        canvas.add(new fabric.IText(txt, {
                            left: 80, top: 100 + (i * 35),
                            fontSize: 18, fontFamily: document.getElementById('font-family').value,
                            fill: '#000', editable: true
                        }));
                    }
                });
                document.getElementById('status-msg').innerText = "Analysis Complete";
                canvas.renderAll();
            });
        };
        reader.readAsDataURL(file);
    };

    // Tools Logic
    function setTextAlign(align) {
        const active = canvas.getActiveObject();
        if(active) { active.set('textAlign', align); canvas.renderAll(); }
    }

    function setTextColor(color) {
        const active = canvas.getActiveObject();
        if(active) { active.set('fill', color); canvas.renderAll(); }
    }

    function adjustCanvas() {
        const size = document.getElementById('paper-size').value;
        canvas.setDimensions({ width: paperSizes[size].w * zoom, height: paperSizes[size].h * zoom });
        canvas.renderAll();
    }

    function zoomCanvas(val) {
        zoom = Math.min(Math.max(zoom + val, 0.3), 2.0);
        canvas.setZoom(zoom);
        adjustCanvas();
        document.getElementById('zoom-text').innerText = Math.round(zoom * 100) + "%";
    }

    function updateFontStyle() {
        const font = document.getElementById('font-family').value;
        canvas.getObjects('i-text').forEach(obj => obj.set('fontFamily', font));
        canvas.renderAll();
    }

    // Interaction
    canvas.on('selection:created', (e) => {
        document.getElementById('edit-box').value = e.selected[0].text;
    });

    document.getElementById('edit-box').oninput = function() {
        const active = canvas.getActiveObject();
        if(active && active.type === 'i-text') {
            active.set('text', this.value);
            canvas.renderAll();
        }
    };

    window.addEventListener('keydown', (e) => {
        if(e.key === "Backspace" && canvas.getActiveObject() && !canvas.getActiveObject().isEditing) {
            canvas.remove(canvas.getActiveObject());
        }
    });

    function savePDF() {
        const { jsPDF } = window.jspdf;
        const sizeKey = document.getElementById('paper-size').value;
        canvas.setZoom(1);
        canvas.setDimensions({ width: paperSizes[sizeKey].w, height: paperSizes[sizeKey].h });
        
        const data = canvas.toDataURL({ format: 'png', multiplier: 2 });
        const pdf = new jsPDF('p', 'px', [paperSizes[sizeKey].w, paperSizes[sizeKey].h]);
        pdf.addImage(data, 'PNG', 0, 0, paperSizes[sizeKey].w, paperSizes[sizeKey].h);
        pdf.save(`ENCODED_DOC_${Date.now()}.pdf`);
        
        zoomCanvas(0); // Restore view
    }

    // Run once to fit
    zoomCanvas(0);
</script>
</body>
</html>
