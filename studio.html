<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GL AI STUDIO | V4.0 PLATINUM</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    
    <style>
        :root { --gold: #ffcc00; --gold-glow: rgba(255, 204, 0, 0.3); --bg: #050505; --glass: rgba(255, 255, 255, 0.03); }
        
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }

        /* Luxury Container */
        .studio-container { width: 100%; max-width: 1300px; background: linear-gradient(145deg, #0a0a0a, #000); border: 1px solid #1a1a1a; border-radius: 40px; padding: 40px; box-shadow: 0 40px 100px rgba(0,0,0,0.8); position: relative; }
        .studio-container::before { content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; background: linear-gradient(45deg, transparent, #333, var(--gold), transparent); z-index: -1; border-radius: 42px; opacity: 0.3; }

        .header-brand { text-align: center; margin-bottom: 40px; }
        .header-brand h1 { font-family: 'Syncopate'; font-size: 1.5rem; letter-spacing: 12px; color: var(--gold); margin: 0; text-shadow: 0 0 20px var(--gold-glow); }
        .header-brand p { font-size: 10px; letter-spacing: 5px; color: #444; text-transform: uppercase; margin-top: 10px; }

        .editor-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; }

        /* Panels */
        .panel { background: var(--glass); border: 1px solid rgba(255,255,255,0.05); border-radius: 30px; padding: 25px; backdrop-filter: blur(10px); }
        .panel-label { color: var(--gold); font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .panel-label::after { content: ''; height: 1px; flex-grow: 1; background: rgba(255,204,0,0.2); }

        /* Canvas Wrapper */
        .preview-box { position: relative; border-radius: 20px; overflow: hidden; background: #000; border: 1px solid #222; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; min-height: 400px; }
        #main-canvas { box-shadow: 0 0 50px rgba(0,0,0,0.5); border: 4px solid #111; }
        #brush-layer { position: absolute; top: 0; left: 0; cursor: crosshair; display: none; z-index: 10; }

        /* Form Elements */
        input[type="file"] { width: 100%; padding: 15px; background: #000; border: 1px dashed #333; border-radius: 15px; color: #666; cursor: pointer; margin-bottom: 20px; }
        select { width: 100%; background: #111; border: 1px solid #222; color: #fff; padding: 15px; border-radius: 12px; margin-bottom: 20px; appearance: none; }
        
        .control-group { background: rgba(0,0,0,0.2); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.02); }
        .control-group label { display: block; font-size: 9px; color: #666; margin-bottom: 8px; font-weight: bold; }
        input[type="range"] { width: 100%; accent-color: var(--gold); background: transparent; }

        /* Buttons */
        .btn-stack { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .btn-sub { background: #000; border: 1px solid #222; color: #fff; padding: 12px; border-radius: 12px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .btn-sub.active { border-color: var(--gold); background: rgba(255,204,0,0.05); color: var(--gold); }

        .btn-main { width: 100%; padding: 20px; background: var(--gold); color: #000; border: none; border-radius: 50px; font-family: 'Syncopate'; font-weight: 800; cursor: pointer; margin-bottom: 15px; box-shadow: 0 10px 30px var(--gold-glow); }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 15px 40px var(--gold-glow); }
        .btn-outline { width: 100%; padding: 15px; background: transparent; border: 1px solid #222; color: #444; border-radius: 50px; font-size: 10px; font-weight: 800; cursor: pointer; letter-spacing: 2px; }
        .btn-outline:hover { color: #fff; border-color: #444; }

        .brush-controls { display: flex; gap: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="studio-container">
    <div class="header-brand">
        <h1>GL AI STUDIO</h1>
        <p>Platinum Edition • Muntinlupa City</p>
    </div>

    <div class="editor-grid">
        <div class="panel">
            <div class="panel-label">01. Source & Tuning</div>
            <input type="file" accept="image/*" onchange="initApp(event)">
            <div id="cropper-container" style="height: 350px; background: #000; border-radius: 20px; overflow: hidden; border: 1px solid #1a1a1a;">
                <img id="raw-img" src="">
            </div>
            
            <div class="control-group" style="margin-top:20px;">
                <label>Skin Tone & Exposure</label>
                <input type="range" id="f-bright" min="50" max="150" value="100" oninput="draw()">
                <input type="range" id="f-con" min="50" max="150" value="100" oninput="draw()" style="margin-top:10px;">
            </div>
        </div>

        <div class="panel">
            <div class="panel-label">02. Attire & Precision</div>
            <select id="size-type" onchange="draw()">
                <option value="2x2">2 x 2 Professional</option>
                <option value="1x1">1 x 1 Standard</option>
                <option value="passport">Passport Special</option>
            </select>

            <div class="btn-stack">
                <button class="btn-sub active" onclick="setSuit('none', this)">Plain</button>
                <button class="btn-sub" onclick="setSuit('studio_img/male_suit.png.png', this)">Male</button>
                <button class="btn-sub" onclick="setSuit('studio_img/female_suit.png.png', this)">Female</button>
            </div>

            <div id="suit-panel" style="display:none;" class="control-group">
                <label>Suit Positioning (Accuracy)</label>
                <input type="range" id="s-y" min="0.5" max="1.5" step="0.001" value="0.84" oninput="draw()">
                <input type="range" id="s-w" min="1.0" max="2.0" step="0.001" value="1.45" oninput="draw()">
                <label style="margin-top:10px;">Color Hue Tint</label>
                <input type="range" id="s-hue" min="0" max="360" value="0" oninput="draw()">
            </div>

            <div class="panel-label" style="margin-top:20px;">03. Neck & Edge Fix</div>
            <div class="brush-controls">
                <button id="brush-btn" class="btn-sub" style="flex-grow:1;" onclick="toggleBrush()">Eraser: OFF</button>
                <button class="btn-sub" onclick="clearFix()">Reset Fix</button>
            </div>
            <p style="font-size:8px; color:#444; margin-top:8px;">*Use Eraser to clean excess shirt around the neck area.</p>
        </div>

        <div class="panel">
            <div class="panel-label">04. Final Result</div>
            <div class="preview-box">
                <canvas id="main-canvas"></canvas>
                <canvas id="brush-layer"></canvas>
            </div>
            
            <div id="action-btns" style="display:none;">
                <button class="btn-main" onclick="downloadPNG()">DOWNLOAD PNG</button>
                <button class="btn-outline" onclick="generateSheet()">GENERATE 4R SHEET</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
    const image = document.getElementById('raw-img');
    const canvas = document.getElementById('main-canvas');
    const ctx = canvas.getContext('2d');
    const brushCanvas = document.getElementById('brush-layer');
    const bctx = brushCanvas.getContext('2d');

    let cropper, suit = new Image(), suitOn = false, activeBG = '#fff';
    let drawing = false, brushOn = false;

    function initApp(e) {
        if(!e.target.files[0]) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            image.src = ev.target.result;
            if (cropper) cropper.destroy();
            cropper = new Cropper(image, {
                aspectRatio: 1, viewMode: 1, dragMode: 'move',
                cropBoxMovable: false, cropBoxResizable: false,
                ready() { draw(); document.getElementById('action-btns').style.display='block'; }
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    function setSuit(path, btn) {
        document.querySelectorAll('.btn-sub').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (path === 'none') {
            suitOn = false;
            document.getElementById('suit-panel').style.display = 'none';
            draw();
        } else {
            suit.src = path;
            suit.onload = () => { suitOn = true; document.getElementById('suit-panel').style.display = 'block'; draw(); };
        }
    }

    function draw() {
        if (!cropper) return;
        const mode = document.getElementById('size-type').value;
        let w = mode === '1x1' ? 300 : 600;
        let h = mode === '1x1' ? 300 : 600;
        if(mode === 'passport') { w = 413; h = 531; }

        canvas.width = w; canvas.height = h;
        brushCanvas.width = w; brushCanvas.height = h;
        canvas.style.width = mode === '1x1' ? "180px" : "240px";
        brushCanvas.style.width = canvas.style.width;
        brushCanvas.style.height = (h * (parseInt(canvas.style.width)/w)) + "px";

        // 1. White BG
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, w, h);

        // 2. Face
        ctx.save();
        ctx.filter = `brightness(${document.getElementById('f-bright').value}%) contrast(${document.getElementById('f-con').value}%)`;
        ctx.drawImage(cropper.getCroppedCanvas({ width: w, height: h }), 0, 0, w, h);
        ctx.restore();

        // 3. Suit
        if (suitOn) {
            ctx.save();
            ctx.filter = `hue-rotate(${document.getElementById('s-hue').value}deg)`;
            const sw = w * document.getElementById('s-w').value;
            const sh = sw * (suit.height / suit.width);
            const sx = (w - sw) / 2;
            const sy = h - (sh * document.getElementById('s-y').value); 
            ctx.drawImage(suit, sx, sy, sw, h * 1.2); // Force height for better fit
            ctx.restore();
        }

        // 4. Overlap Brush
        ctx.drawImage(brushCanvas, 0, 0, w, h);
    }

    // BRUSH TOOL LOGIC
    function toggleBrush() {
        brushOn = !brushOn;
        const btn = document.getElementById('brush-btn');
        btn.innerHTML = brushOn ? "Eraser: ON" : "Eraser: OFF";
        btn.classList.toggle('active', brushOn);
        brushCanvas.style.display = brushOn ? 'block' : 'none';
    }

    function clearFix() { bctx.clearRect(0, 0, brushCanvas.width, brushCanvas.height); draw(); }

    brushCanvas.onmousedown = (e) => { drawing = true; paint(e); };
    brushCanvas.onmousemove = (e) => paint(e);
    window.onmouseup = () => { drawing = false; draw(); };

    function paint(e) {
        if(!drawing || !brushOn) return;
        const rect = brushCanvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (brushCanvas.width / rect.width);
        const y = (e.clientY - rect.top) * (brushCanvas.height / rect.height);

        bctx.fillStyle = "#ffffff";
        bctx.beginPath();
        bctx.arc(x, y, 15, 0, Math.PI * 2);
        bctx.fill();
    }

    function downloadPNG() {
        const link = document.createElement('a');
        link.download = `GL_PRO_RESULT.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    function generateSheet() {
        const sheet = document.createElement('canvas');
        const sctx = sheet.getContext('2d');
        sheet.width = 1200; sheet.height = 1800; // 4R @ 300dpi
        sctx.fillStyle = "#fff"; sctx.fillRect(0,0,1200,1800);
        
        for(let r=0; r<3; r++) {
            for(let c=0; c<2; c++) {
                sctx.drawImage(canvas, 30 + (c*580), 30 + (r*580), 550, 550);
            }
        }
        const link = document.createElement('a');
        link.download = `GL_PRINT_SHEET.png`;
        link.href = sheet.toDataURL('image/png');
        link.click();
    }
</script>

</body>
</html>
