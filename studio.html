<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GL AI PHOTO STUDIO | Muntinlupa</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon-gold: #ffcc00; --deep-blue: #0052da; --glass: rgba(255, 255, 255, 0.03); }
        body { background-color: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .studio-card { width: 100%; max-width: 500px; background: #0a0a0a; border: 1px solid #222; border-radius: 20px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { font-family: 'Syncopate'; font-size: 14px; color: var(--neon-gold); text-align: center; letter-spacing: 3px; margin-bottom: 30px; }
        .upload-zone { border: 2px dashed #333; border-radius: 15px; padding: 40px; text-align: center; cursor: pointer; transition: 0.3s; }
        .upload-zone:hover { border-color: var(--neon-gold); background: rgba(255, 204, 0, 0.02); }
        select, button { width: 100%; padding: 12px; margin-top: 15px; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; font-family: 'Space Grotesk'; font-size: 14px; }
        .btn-generate { background: var(--neon-gold); color: #000; font-family: 'Syncopate'; font-weight: bold; font-size: 10px; border: none; cursor: pointer; margin-top: 25px; transition: 0.3s; }
        .btn-generate:disabled { background: #444; cursor: not-allowed; }
        canvas { width: 100%; border-radius: 10px; margin-top: 20px; border: 1px solid #222; display: none; background: #fff; }
        .status-badge { font-family: 'Syncopate'; font-size: 8px; color: var(--neon Gold); text-align: center; display: block; margin-top: 10px; }
        .payment-box { display: none; margin-top: 25px; border-top: 1px solid #222; padding-top: 20px; }
    </style>
</head>
<body>

<div class="studio-card">
    <h1>GL AI STUDIO v2.0</h1>

    <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <span id="upload-text" style="color: #666; font-size: 12px;">TAP TO UPLOAD SELFIE</span>
        <input type="file" id="file-input" style="display: none;" accept="image/*" onchange="handleUpload(this)">
    </div>

    <div id="controls" style="display: none;">
        <select id="bg-select">
            <option value="#ffffff">White Background</option>
            <option value="#0033aa">Blue Background</option>
            <option value="#cc0000">Red Background</option>
        </select>

        <select id="attire-select">
            <option value="none">Original Clothes</option>
            <option value="https://i.imgur.com/6WbXW7B.png">Female Corporate Suit</option>
            <option value="https://i.imgur.com/3pX6z6f.png">Male Formal Suit</option>
        </select>

        <button class="btn-generate" id="gen-btn" onclick="processAI()">GENERATE AI TRANSFORMATION</button>
    </div>

    <canvas id="studio-canvas"></canvas>
    <span id="scan-status" class="status-badge" style="display: none;">AI EDITING COMPLETE ✓</span>

    <div class="payment-box" id="payment-area">
        <p style="font-size: 11px; color: #888; text-align: center;">PROTECTED PREVIEW. Pay via GCash to receive HD Non-Watermarked file.</p>
        <button onclick="window.open('https://m.me/GLPrintingServicesMuntinlupa', '_blank')" style="background: var(--deep-blue); border: none;">MESSAGE TO PAY & GET HD</button>
    </div>
</div>

<script>
    const API_KEY = "jLB5yNzuAru3Mq3LQHiZnd66"; // I-check mo kung may credits pa
    let uploadedFile = null;

    // --- UPLOAD HANDLER: Para siguradong makapag-upload ---
    function handleUpload(input) {
        if (input.files && input.files[0]) {
            uploadedFile = input.files[0];
            const uploadText = document.getElementById('upload-text');
            uploadText.innerText = "PHOTO LOADED: " + uploadedFile.name;
            uploadText.style.color = "#ffcc00"; // Neon Gold
            document.getElementById('controls').style.display = "block";
            console.log("File loaded successfully: " + uploadedFile.name);
        } else {
            console.error("No file selected.");
        }
    }

    // --- AI PROCESSING LOGIC: Background Removal ---
    async function processAI() {
        if (!uploadedFile) { alert("Please upload a photo first."); return; }
        
        const btn = document.getElementById('gen-btn');
        btn.innerText = "AI IS PROCESSING...";
        btn.disabled = true;

        const formData = new FormData();
        formData.append('image_file', uploadedFile);
        formData.append('size', 'auto');

        try {
            const response = await fetch('https://api.remove.bg/v1.0/removebg', {
                method: 'POST',
                headers: { 'X-API-Key': API_KEY },
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                startDrawingProcess(url);
            } else {
                alert("API Error: Pakicheck ang credits sa Remove.bg.");
            }
        } catch (err) {
            alert("Connection Error.");
        } finally {
            btn.innerText = "GENERATE AI TRANSFORMATION";
            btn.disabled = false;
        }
    }

    // --- DRAWING PROCESS: Layering and Positioning ---
    function startDrawingProcess(customerImgUrl) {
        const canvas = document.getElementById('studio-canvas');
        const ctx = canvas.getContext('2d');
        const bgColor = document.getElementById('bg-select').value;
        const attireUrl = document.getElementById('attire-select').value;

        const customerImg = new Image();
        const attireImg = new Image();

        // Standard Portrait Ratio para sa ID Photos
        canvas.width = 800;
        canvas.height = 1000;

        customerImg.onload = function() {
            if (attireUrl !== "none") {
                // Kailangan ng crossOrigin para hindi ma-block ng browser ang suit from Imgur
                attireImg.crossOrigin = "anonymous";
                attireImg.src = attireUrl;
                
                attireImg.onload = function() {
                    console.log("Suit loaded. Performing overlay.");
                    // Dito na ang layering kung saan nasa ibabaw ang suit
                    performFinalDrawing(ctx, canvas, bgColor, customerImg, attireImg);
                };
                attireImg.onerror = function() {
                    console.error("Failed to load suit image.");
                    performFinalDrawing(ctx, canvas, bgColor, customerImg, null);
                };
            } else {
                performFinalDrawing(ctx, canvas, bgColor, customerImg, null);
            }
        };
        customerImg.src = customerImgUrl;
    }

    // --- FINAL RENDERING: Automatic Zoom, Makeup, and Watermark ---
    function performFinalDrawing(ctx, canvas, bgColor, customerImg, attireImg) {
        // 1. White/Blue/Red Background
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. MAKEUP/SKIN SMOOTHING FILTER
        ctx.filter = "brightness(1.08) contrast(1.05) saturate(1.1) blur(0.3px)";

        // 3. DRAW CUSTOMER (Positioned slightly lower and zoomed)
        // Nilalakihan (zoom) para magmukhang professional na 2x2 photo
        const zoom = 1.45; 
        const nw = canvas.width * zoom;
        const nh = (customerImg.height / customerImg.width) * nw;
        
        // I-pwesto ang mukha sa gitna (centered vertically and horizontally)
        ctx.drawImage(customerImg, (canvas.width - nw) / 2, 100, nw, nh);

        // 4. DRAW ATTIRE (Overlay)
        // Ito ang tatakip sa strap ng pambahay at sa background
        if (attireImg) {
            ctx.filter = "none"; // Off filter para sharp ang suit
            // Ang suit ay sumasakop sa buong canvas width
            ctx.drawImage(attireImg, 0, 0, canvas.width, canvas.height);
        }

        // 5. Apply Security Watermark
        ctx.save();
        ctx.fillStyle = "rgba(255, 204, 0, 0.3)";
        ctx.font = "bold 55px Syncopate";
        ctx.textAlign = "center";
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.rotate(-45 * Math.PI / 180);
        ctx.fillText("GL PRINTS - UNPAID", 0, 0); // Strict Payment First
        ctx.restore();

        // 6. Finalize UI
        canvas.style.display = "block";
        document.getElementById('scan-status').style.display = "block";
        document.getElementById('payment-area').style.display = "block";
        canvas.scrollIntoView({ behavior: 'smooth' });
        console.log("Transformation Complete.");
    }
</script>

</body>
</html>
