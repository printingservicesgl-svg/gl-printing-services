<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GL HYPER-DASH V80 | ULTIMATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Space+Grotesk:wght@300;500;700&family=Lora:ital,wght@0,400;0,700;1,400&family=Space+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --accent: #ffcc00; --bg: #050505; --panel: #0f0f0f; --border: rgba(255,255,255,0.08); --glass: rgba(255,255,255,0.03); }
        * { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.4,0,0.2,1); }
        
        body { background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* --- HYPER SIDEBAR --- */
        .sidebar { width: 450px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: relative; }
        .sb-brand { padding: 35px; background: linear-gradient(to bottom, #000, var(--panel)); border-bottom: 1px solid var(--border); }
        .sb-brand h1 { font-family: 'Syncopate'; font-size: 15px; color: var(--accent); letter-spacing: 6px; margin: 0; }
        .sb-brand span { font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 2px; }

        /* Navigation Tabs */
        .nav-tabs { display: flex; background: #000; padding: 5px; gap: 5px; }
        .tab-btn { flex: 1; padding: 12px; font-size: 10px; font-weight: 800; border: none; background: none; color: #444; cursor: pointer; text-transform: uppercase; border-radius: 6px; }
        .tab-btn.active { background: var(--glass); color: var(--accent); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        .content-scroll { padding: 25px; overflow-y: auto; flex: 1; scrollbar-width: none; }
        .section-box { background: var(--glass); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .label { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; display: block; }

        /* Input Controls */
        input, select, textarea { width: 100%; padding: 14px; background: #000; border: 1px solid var(--border); border-radius: 8px; color: #fff; font-size: 13px; margin-bottom: 10px; outline: none; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(255,204,0,0.1); }
        
        /* Dashboard Buttons */
        .grid-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .dash-btn { padding: 12px 5px; background: #151515; border: 1px solid var(--border); border-radius: 8px; color: #ccc; font-size: 10px; font-weight: 600; cursor: pointer; text-align: center; }
        .dash-btn:hover { background: var(--accent); color: #000; transform: translateY(-2px); }

        /* --- STAGE --- */
        .stage { flex: 1; background: radial-gradient(circle at center, #111 0%, #050505 100%); position: relative; display: flex; flex-direction: column; }
        
        /* Floating HUD Toolbar */
        .hud-toolbar { position: absolute; top: 25px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); padding: 10px 30px; border-radius: 100px; border: 1px solid var(--border); display: flex; gap: 20px; align-items: center; z-index: 1000; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .hud-tool { background: none; border: none; color: #fff; cursor: pointer; font-size: 14px; opacity: 0.6; }
        .hud-tool:hover { opacity: 1; color: var(--accent); }

        .paper-container { flex: 1; overflow-y: auto; padding: 120px 40px; display: flex; justify-content: center; scroll-behavior: smooth; }
        
        #paper { 
            width: 210mm; min-height: 297mm; background: #fff; color: #000; 
            padding: 25mm 20mm; box-shadow: 0 50px 120px rgba(0,0,0,0.8); 
            transform: scale(0.9); transform-origin: top center; position: relative;
        }

        /* Document Elements */
        .doc-header { text-align: center; border-bottom: 2px solid #000; margin-bottom: 40px; padding-bottom: 15px; font-family: 'Space Grotesk'; font-weight: 700; font-size: 28px; outline: none; }
        .doc-title { text-align: center; font-weight: 800; text-transform: uppercase; font-size: 18px; margin-bottom: 50px; outline: none; }
        #doc-content { line-height: 1.8; text-align: justify; outline: none; min-height: 500px; font-size: 14px; }

        /* Dynamic Stamp/QR */
        .footer-elements { margin-top: 60px; display: flex; justify-content: space-between; align-items: flex-end; }
        .sig-box { width: 220px; text-align: center; border-top: 1.5px solid #000; padding-top: 5px; font-weight: 700; font-size: 12px; position: relative; }
        #qr-gen { width: 70px; height: 70px; opacity: 0.8; }
        #sig-upload-preview { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); max-height: 70px; display: none; }

        /* Status & System */
        .sys-bar { background: #000; padding: 10px 25px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-family: 'Space Mono'; font-size: 10px; color: #444; }
        .pulse { width: 8px; height: 8px; background: #00ff00; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 10px #00ff00; }

        /* Print Action */
        .action-area { padding: 25px; background: #000; }
        .btn-execute { width: 100%; padding: 20px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-family: 'Syncopate'; font-weight: 800; font-size: 12px; cursor: pointer; letter-spacing: 2px; }
        .btn-execute:hover { background: #fff; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sb-brand">
        <h1>GL HYPER-DASH</h1>
        <span>Next-Gen Document Engine</span>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="setTab(event, 'core')">Core</button>
        <button class="tab-btn" onclick="setTab(event, 'fx')">Design FX</button>
        <button class="tab-btn" onclick="setTab(event, 'sys')">System</button>
    </div>

    <div class="content-scroll">
        <div id="core" class="tab-pane active">
            <div class="section-box">
                <span class="label">Document Blueprint</span>
                <select id="doc-type" onchange="initEngine()">
                    <option value="scholarship">Scholarship Intent</option>
                    <option value="auth">Authorization (Claiming)</option>
                    <option value="promissory">Promissory Note</option>
                    <option value="affidavit">General Affidavit</option>
                </select>
                <div id="dynamic-fields"></div>
            </div>

            <div class="section-box">
                <span class="label">AI Tone Switcher</span>
                <div class="grid-buttons">
                    <button class="dash-btn" onclick="changeTone('formal')">Formal</button>
                    <button class="dash-btn" onclick="changeTone('urgent')">Urgent</button>
                    <button class="dash-btn" onclick="changeTone('polite')">Polite</button>
                </div>
            </div>
        </div>

        <div id="fx" class="tab-pane">
            <div class="section-box">
                <span class="label">Typography System</span>
                <select id="font-family" onchange="refresh()">
                    <option value="'Lora'">Classic Serif</option>
                    <option value="'Plus Jakarta Sans'">Modern Sans</option>
                    <option value="'Space Grotesk'">Neo-Brutalist</option>
                </select>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <input type="number" id="font-size" value="14" oninput="refresh()">
                    <input type="color" id="accent-picker" value="#ffcc00" oninput="changeAccent(this.value)" style="width: 60px; padding: 0; height: 45px;">
                </div>
            </div>

            <div class="section-box">
                <span class="label">Security Stamp</span>
                <input type="text" id="watermark-input" value="GL PRINTING" oninput="refresh()">
                <input type="file" onchange="handleSignature(event)" style="font-size: 11px;">
            </div>
        </div>

        <div id="sys" class="tab-pane">
            <div class="section-box">
                <span class="label">Viewport Control</span>
                <input type="range" min="0.5" max="1.1" step="0.01" value="0.9" oninput="zoom(this.value)">
                <div class="grid-buttons" style="margin-top: 10px;">
                    <button class="dash-btn" onclick="setPaper('#ffffff')">White</button>
                    <button class="dash-btn" onclick="setPaper('#f5f5f5')">Silver</button>
                    <button class="dash-btn" onclick="setPaper('#fcf8e8')">Parchment</button>
                </div>
            </div>
        </div>
    </div>

    <div class="action-area">
        <button class="btn-execute" onclick="exportPDF()">PRINT DOCUMENT ➜</button>
    </div>
</div>

<div class="stage">
    <div class="hud-toolbar">
        <button class="hud-tool" onclick="cmd('bold')"><b>B</b></button>
        <button class="hud-tool" onclick="cmd('italic')"><i>I</i></button>
        <button class="hud-tool" onclick="cmd('underline')"><u>U</u></button>
        <div style="width:1px; height:20px; background:var(--border);"></div>
        <button class="hud-tool" onclick="cmd('justifyLeft')">L</button>
        <button class="hud-tool" onclick="cmd('justifyCenter')">C</button>
        <button class="hud-tool" onclick="cmd('justifyRight')">R</button>
        <button class="hud-tool" onclick="cmd('justifyFull')">J</button>
    </div>

    <div class="paper-container">
        <div id="paper">
            <div id="h-render" class="doc-header" contenteditable="true">GL DOCUMENT SUITE</div>
            <div id="t-render" class="doc-title" contenteditable="true">OFFICIAL STATEMENT</div>
            <div id="doc-content" contenteditable="true">Initializing engine...</div>
            
            <div class="footer-elements">
                <div class="sig-box">
                    <img id="sig-upload-preview" src="" />
                    <span id="name-render">SIGNATURE OVER PRINTED NAME</span>
                </div>
                <img id="qr-gen" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=GL-VERIFIED" />
            </div>
        </div>
    </div>

    <div class="sys-bar">
        <span><span class="pulse"></span> SYSTEM: ONLINE</span>
        <span>LATENCY: 12ms</span>
        <span id="stats">WORDS: 0 | CHARS: 0</span>
    </div>
</div>

<script>
    const engine = {
        scholarship: {
            title: "Letter of Intent for Scholarship",
            fields: [{id:'name', l:'Student Name'}, {id:'dean', l:'Office Head'}, {id:'course', l:'Current Year & Course'}],
            content: (v) => `Dear ${v.dean},\n\nI, ${v.name}, a student currently enrolled in ${v.course}, am writing to formally express my interest in applying for your scholarship program.\n\nI am confident that my academic record and passion for learning make me a strong candidate. This assistance would greatly support my education.\n\nThank you for your consideration.`
        },
        auth: {
            title: "Authorization Letter",
            fields: [{id:'name', l:'Your Name'}, {id:'rep', l:'Representative Name'}, {id:'item', l:'Item/Document to Claim'}],
            content: (v) => `To Whom It May Concern,\n\nI, ${v.name}, hereby authorize ${v.rep} to claim my ${v.item} on my behalf. I am currently unable to do this personally.\n\nPlease accept my apologies and thank you for your assistance.`
        }
    };

    function setTab(e, id) {
        document.querySelectorAll('.tab-pane, .tab-btn').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }

    function initEngine() {
        const mode = document.getElementById('doc-type').value;
        const container = document.getElementById('dynamic-fields');
        container.innerHTML = '';
        engine[mode].fields.forEach(f => {
            const label = document.createElement('span'); label.className = 'label'; label.innerText = f.l;
            const input = document.createElement('input'); input.id = `in-${f.id}`; input.oninput = refresh;
            container.appendChild(label); container.appendChild(input);
        });
        refresh();
    }

    function refresh() {
        const mode = document.getElementById('doc-type').value;
        const vals = {};
        engine[mode].fields.forEach(f => vals[f.id] = document.getElementById(`in-${f.id}`).value || '________');
        
        document.getElementById('t-render').innerText = engine[mode].title;
        document.getElementById('doc-content').innerText = engine[mode].content(vals);
        document.getElementById('name-render').innerText = vals.name || 'SIGNATURE OVER PRINTED NAME';

        const body = document.getElementById('doc-content');
        body.style.fontFamily = document.getElementById('font-family').value;
        body.style.fontSize = document.getElementById('font-size').value + 'px';
        
        updateStats();
    }

    function changeTone(tone) {
        let content = document.getElementById('doc-content').innerText;
        if(tone === 'urgent') content = "URGENT: " + content + " I hope to receive a response immediately.";
        if(tone === 'polite') content = "I am writing to you with great respect. " + content + " Thank you so much.";
        document.getElementById('doc-content').innerText = content;
    }

    function changeAccent(color) {
        document.documentElement.style.setProperty('--accent', color);
    }

    function zoom(v) { document.getElementById('paper').style.transform = `scale(${v})`; }
    function setPaper(c) { document.getElementById('paper').style.background = c; }
    function cmd(c) { document.execCommand(c, false, null); }

    function handleSignature(e) {
        const reader = new FileReader();
        reader.onload = () => {
            const img = document.getElementById('sig-upload-preview');
            img.src = reader.result; img.style.display = 'block';
        }
        reader.readAsDataURL(e.target.files[0]);
    }

    function updateStats() {
        const text = document.getElementById('doc-content').innerText;
        document.getElementById('stats').innerText = `WORDS: ${text.split(' ').length} | CHARS: ${text.length}`;
    }

    function exportPDF() {
        const element = document.getElementById('paper');
        html2pdf().set({ margin: 0, filename: 'GL_HYPER_DOC.pdf', html2canvas: { scale: 3 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).from(element).save();
    }

    window.onload = initEngine;
</script>
</body>
</html>
